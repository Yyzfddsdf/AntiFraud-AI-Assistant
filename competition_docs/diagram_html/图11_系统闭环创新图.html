<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图11 系统闭环创新图</title>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({
      startOnLoad: true,
      theme: "base",
      securityLevel: "loose",
      themeVariables: {
        primaryColor: "#eef8f1",
        primaryTextColor: "#173042",
        primaryBorderColor: "#2f7d57",
        lineColor: "#668093",
        secondaryColor: "#eef4ff",
        tertiaryColor: "#fff6e8",
        fontFamily: "Microsoft YaHei, PingFang SC, sans-serif",
        fontSize: "18px"
      },
      themeCSS: `
        .node rect, .node polygon, .node path {
          rx: 20px !important;
          ry: 20px !important;
        }
      `,
      flowchart: { curve: "basis", htmlLabels: true, nodeSpacing: 34, rankSpacing: 48 }
    });
  </script>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: linear-gradient(145deg, #f6fffb, #fff8fb); color: #233447; }
    .wrap { max-width: 1450px; margin: 0 auto; padding: 32px; }
    .card { background: rgba(255,255,255,0.9); border: 1px solid #e2e7e5; border-radius: 24px; box-shadow: 0 18px 44px rgba(40, 64, 60, 0.1); padding: 24px; }
    h1 { margin: 0 0 10px; font-size: 30px; }
    p { margin: 0 0 20px; color: #66798a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>图11 系统闭环创新图</h1>
      <p>展示项目从输入到再利用的完整系统闭环。</p>
      <div class="mermaid">
flowchart LR
    A["多模态输入"]
    B["智能分析"]
    C["结构化报告"]
    D["历史归档"]
    E["实时预警/家庭联动"]
    F["案例送审入库"]
    G["后续检索与再利用"]

    A --> B --> C --> D --> E --> F --> G --> B
    classDef loop fill:#eef8f1,stroke:#2f7d57,color:#173042,stroke-width:1.8px;
    class A,B,C,D,E,F,G loop;
      </div>
    </div>
  </div>
</body>
</html>
