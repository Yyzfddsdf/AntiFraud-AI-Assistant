<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
  <defs>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 14px; fill: #64748B; }
    .bento-card { fill: #FFFFFF; stroke-width: 1.5; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.02)); }
    .bento-header { stroke-width: 1.5; }
    .bento-title { font-family: "PingFang SC", sans-serif; font-size: 15px; font-weight: 800; fill: #1E293B; }
    .item-text { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #475569; }
    .line-emerald { stroke: #10B981; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .line-blue { stroke: #3B82F6; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .status-high { fill: #FEF2F2; stroke: #EF4444; stroke-width: 1.5; }
    .status-mid { fill: #FFFBEB; stroke: #F59E0B; stroke-width: 1.5; }
    .status-low { fill: #F0FDF4; stroke: #10B981; stroke-width: 1.5; }
  </style>

  <rect width="1000" height="850" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">数据库与缓存多级协同架构</text>

  <!-- APP Logic Core (Indigo Overlay) -->
  <g transform="translate(60, 130)">
    <rect width="880" height="110" rx="16" class="bento-card" stroke="#6366F1" stroke-width="2"/>
    <text x="440" y="50" text-anchor="middle" class="bento-title" font-size="17" fill="#4338CA">核心判研逻辑执行层 (Backend Logic Engine)</text>
    <text x="440" y="80" text-anchor="middle" class="item-text" font-weight="800" fill="#6366F1">调度数据召回、风险模型推演、多模态聚合评分与全景报告生成</text>
  </g>

  <!-- REDIS CACHE SECTOR (Emerald) -->
  <g transform="translate(60, 280)">
    <rect width="420" height="520" rx="20" class="bento-card" stroke="#10B981"/>
    <path d="M 0 20 Q 0 0 20 0 L 280 0 Q 300 0 300 20 L 300 45 L 0 45 Z" class="bento-header" fill="url(#grad-emerald)" stroke="#10B981"/>
    <text x="20" y="28" class="bento-title" fill="#065F46">Redis 高速缓存 / 状态分片</text>
    
    <g transform="translate(30, 70)">
        <rect width="360" height="120" rx="12" class="bento-card" stroke="#10B981" stroke-opacity="0.3"/>
        <text x="50" y="35" class="bento-title" font-size="13" fill="#065F46">风险评分缓存索引</text>
        <g transform="translate(50, 55)">
            <rect width="85" height="45" rx="8" class="status-high"/>
            <text x="42.5" y="28" text-anchor="middle" class="item-text" font-weight="800" fill="#B91C1C">高危</text>
            <rect x="95" width="85" height="45" rx="8" class="status-mid"/>
            <text x="137.5" y="28" text-anchor="middle" class="item-text" font-weight="800" fill="#92400E">中危</text>
            <rect x="190" width="85" height="45" rx="8" class="status-low"/>
            <text x="232.5" y="28" text-anchor="middle" class="item-text" font-weight="800" fill="#065F46">低危/安全</text>
        </g>
    </g>

    <g transform="translate(30, 215)">
        <rect width="170" height="130" rx="12" class="bento-card"/>
        <text x="85" y="35" text-anchor="middle" class="bento-title" font-size="12">会话热点池</text>
        <text x="85" y="70" text-anchor="middle" class="item-text">上下文对话管理</text>
        <text x="85" y="95" text-anchor="middle" class="item-text">语义状态召回</text>
    </g>

    <g transform="translate(220, 215)">
        <rect width="170" height="130" rx="12" class="bento-card"/>
        <text x="85" y="35" text-anchor="middle" class="bento-title" font-size="12">RAG 向量预热</text>
        <text x="85" y="70" text-anchor="middle" class="item-text">关键向量 Embedding</text>
        <text x="85" y="95" text-anchor="middle" class="item-text">亚毫秒级读取性能</text>
    </g>

    <g transform="translate(30, 365)">
        <rect width="360" height="110" rx="12" class="bento-card"/>
        <text x="25" y="35" class="bento-title" font-size="12">频率限制与状态分布式锁</text>
        <text x="25" y="65" class="item-text">• Captcha 校验码动态存根</text>
        <text x="25" y="90" class="item-text">• 全局 Rate-Limiting 分布式限流器</text>
    </g>
  </g>

  <!-- SQLITE PERSISTENCE SECTOR (Blue) -->
  <g transform="translate(520, 280)">
    <rect width="420" height="520" rx="20" class="bento-card" stroke="#3B82F6"/>
    <path d="M 0 20 Q 0 0 20 0 L 280 0 Q 300 0 300 20 L 300 45 L 0 45 Z" class="bento-header" fill="url(#grad-blue)" stroke="#3B82F6"/>
    <text x="20" y="28" class="bento-title" fill="#1D4ED8">SQLite 核心数据底座 / 存档</text>

    <g transform="translate(30, 75)">
        <rect width="360" height="120" rx="12" class="bento-card"/>
        <text x="25" y="35" class="bento-title" font-size="13" fill="#1D4ED8">分级风险案例库 (Case Archive)</text>
        <text x="25" y="70" class="item-text">• 已判研的高/中风险流水存证</text>
        <text x="25" y="95" class="item-text">• 包含上下文文本、话术特征与指纹数据</text>
    </g>

    <g transform="translate(30, 220)">
        <rect width="360" height="120" rx="12" class="bento-card"/>
        <text x="25" y="35" class="bento-title" font-size="13" fill="#1D4ED8">反诈知识语义底座 (Knowledge Base)</text>
        <text x="25" y="70" class="item-text">• 法律法规、白名单及诈骗样板知识召回</text>
        <text x="25" y="95" class="item-text">• 全球公认诈骗话术图谱语义沉淀</text>
    </g>

    <g transform="translate(30, 365)">
        <rect width="360" height="120" rx="12" class="bento-card" stroke="#6366F1" stroke-width="1.5"/>
        <text x="25" y="35" class="bento-title" font-size="13" fill="#4338CA">用户契约与家庭防线映射</text>
        <text x="25" y="70" class="item-text">• 守护人绑定关系链与授权存证</text>
        <text x="25" y="95" class="item-text">• 状态推送配置、多端同步策略镜像</text>
    </g>
  </g>

  <!-- Connectors (Smooth Curves) -->
  <path d="M 270 240 Q 270 260 270 280" class="line-emerald" marker-end="url(#arrow-emerald)"/>
  <path d="M 730 240 Q 730 260 730 280" class="line-blue" marker-end="url(#arrow-blue)"/>
  
  <path d="M 480 450 Q 500 450 520 450" class="line-emerald" stroke-dasharray="6 4" marker-end="url(#arrow-emerald)"/>
  <text x="470" y="440" text-anchor="middle" class="item-text" font-weight="800" fill="#10B981">Cache</text>
  
  <path d="M 520 550 Q 500 550 480 550" class="line-blue" stroke-dasharray="6 4" marker-end="url(#arrow-blue)"/>
  <text x="530" y="540" text-anchor="middle" class="item-text" font-weight="800" fill="#3B82F6">Write</text>

</svg>
