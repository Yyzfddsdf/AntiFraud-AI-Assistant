<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="650" viewBox="0 0 1000 650">
  <defs>
    <linearGradient id="grad-rose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4E6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFEFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CFFAFE;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-big" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <style type="text/css">
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 14px; fill: #64748B; }
    .node-card { fill: #FFFFFF; stroke-width: 1.5; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.03)); }
    .node-title { font-family: "PingFang SC", sans-serif; font-size: 14px; font-weight: 800; fill: #1E293B; }
    .node-desc { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #475569; }
    .flow-arrow { stroke: #CBD5E1; stroke-width: 8; fill: none; stroke-linecap: round; marker-end: url(#arrow-big); }
  </style>

  <rect width="1000" height="650" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">自动化风险响应联动链路</text>

  <!-- Flow Arrows (Monodirectional) -->
  <line x1="260" y1="300" x2="310" y2="300" class="flow-arrow"/>
  <line x1="490" y1="300" x2="540" y2="300" class="flow-arrow"/>
  <line x1="720" y1="300" x2="770" y2="300" class="flow-arrow"/>

  <!-- Milestone 1: Classification (Rose) -->
  <g transform="translate(45, 230)">
    <rect width="210" height="140" rx="16" ry="16" class="node-card" stroke="#F43F5E"/>
    <path d="M 0 16 Q 0 0 16 0 L 194 0 Q 210 0 210 16 L 210 35 L 0 35 Z" fill="url(#grad-rose)" stroke="#F43F5E" stroke-width="1.5"/>
    <text x="105" y="22" text-anchor="middle" class="node-title" fill="#BE123C">01 分级判定触发</text>
    <text x="25" y="65" class="node-desc">• 高风险 (High): 强力自动拦截</text>
    <text x="25" y="87" class="node-desc">• 中风险 (Mid): 持续风险预警</text>
    <text x="25" y="109" class="node-desc">• 低风险 (Low): 重点回路监视</text>
  </g>

  <!-- Milestone 2: Cloud Sync (Blue) -->
  <g transform="translate(305, 230)">
    <rect width="210" height="140" rx="16" ry="16" class="node-card" stroke="#3B82F6"/>
    <path d="M 0 16 Q 0 0 16 0 L 194 0 Q 210 0 210 16 L 210 35 L 0 35 Z" fill="url(#grad-blue)" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="105" y="22" text-anchor="middle" class="node-title" fill="#1D4ED8">02 云端异步存证</text>
    <text x="105" y="75" text-anchor="middle" class="node-desc">自动将特征上传治理中心</text>
    <text x="105" y="95" text-anchor="middle" class="node-desc">Archive &amp; Analytics Sync</text>
    <text x="105" y="115" text-anchor="middle" class="node-desc" font-weight="800" fill="#3B82F6">>> Next Stage</text>
  </g>

  <!-- Milestone 3: WS Broadcast (Emerald) -->
  <g transform="translate(535, 230)">
    <rect width="210" height="140" rx="16" ry="16" class="node-card" stroke="#10B981" stroke-width="2"/>
    <path d="M 0 16 Q 0 0 16 0 L 194 0 Q 210 0 210 16 L 210 35 L 0 35 Z" fill="url(#grad-emerald)" stroke="#10B981" stroke-width="1.5"/>
    <text x="105" y="22" text-anchor="middle" class="node-title" fill="#065F46">03 家庭联防广播</text>
    <text x="25" y="65" class="node-desc">• WebSocket 极速状态广播</text>
    <text x="25" y="87" class="node-desc">• 守护人终端高危同步弹窗</text>
    <text x="25" y="109" class="node-desc">• 远程强制干预指令执行</text>
  </g>

  <!-- Milestone 4: Governance Loop (Cyan) -->
  <g transform="translate(765, 230)">
    <rect width="200" height="140" rx="16" ry="16" class="node-card" stroke="#0891B2"/>
    <path d="M 0 16 Q 0 0 16 0 L 184 0 Q 200 0 200 16 L 200 35 L 0 35 Z" fill="url(#grad-cyan)" stroke="#0891B2" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" class="node-title" fill="#0E7490">04 全域治理闭环</text>
    <text x="25" y="65" class="node-desc">• 专家审核二次权重回标</text>
    <text x="25" y="87" class="node-desc">• 风险特征沉淀至知识库</text>
    <text x="25" y="109" class="node-desc">• 驱动全平台 RAG 优化</text>
  </g>

</svg>
