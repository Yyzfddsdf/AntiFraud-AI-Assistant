<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="850" viewBox="0 0 1000 850">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <style type="text/css">
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 14px; fill: #64748B; }
    .bento-card { fill: #FFFFFF; stroke-width: 1.5; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.02)); }
    .bento-header { stroke-width: 1.5; }
    .bento-title { font-family: "PingFang SC", sans-serif; font-size: 14px; font-weight: 800; fill: #1E293B; }
    .item-text { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #475569; }
    .box { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.2; rx: 12; ry: 12; }
    .box-highlight { fill: #FFFFFF; stroke-width: 2; rx: 12; ry: 12; }
  </style>

  <rect width="1000" height="850" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">反诈知识治理与平台运营架构</text>

  <!-- BENTO PIPELINE GRID -->

  <!-- Top Left: Data Sources (Blue Domain) -->
  <g transform="translate(60, 135)">
    <rect width="430" height="205" rx="16" ry="16" class="bento-card" stroke="#3B82F6"/>
    <path d="M 0 16 Q 0 0 16 0 L 284 0 Q 300 0 300 16 L 300 45 L 0 45 Z" class="bento-header" fill="url(#grad-blue)" stroke="#3B82F6"/>
    <text x="20" y="28" class="bento-title" fill="#1D4ED8">信息汇聚与捕捉 (Sources)</text>
    
    <g transform="translate(30, 70)">
        <rect width="180" height="110" class="box"/>
        <text x="90" y="42" text-anchor="middle" class="item-text" font-weight="800" fill="#1E3A8A">存量研判存证流</text>
        <text x="90" y="72" text-anchor="middle" class="item-text">自动锁定中高风险</text>
        <text x="90" y="92" text-anchor="middle" class="item-text">关键诈骗场景特征</text>
    </g>
    
    <g transform="translate(220, 70)">
        <rect width="185" height="110" class="box"/>
        <text x="92" y="42" text-anchor="middle" class="item-text" font-weight="800" fill="#1E3A8A">主动采集侦测引擎</text>
        <text x="92" y="72" text-anchor="middle" class="item-text">公开法律法规动态挖掘</text>
        <text x="92" y="92" text-anchor="middle" class="item-text">新型话术样本实时搜集</text>
    </g>
  </g>

  <!-- Top Right: Processing Hub (Emerald Domain) -->
  <g transform="translate(510, 135)">
    <rect width="430" height="205" rx="16" ry="16" class="bento-card" stroke="#10B981"/>
    <path d="M 0 16 Q 0 0 16 0 L 284 0 Q 300 0 300 16 L 300 45 L 0 45 Z" class="bento-header" fill="url(#grad-emerald)" stroke="#10B981"/>
    <text x="20" y="28" class="bento-title" fill="#065F46">智慧化治理引擎 (Processing)</text>

    <g transform="translate(30, 70)">
        <rect width="175" height="115" class="box"/>
        <text x="87" y="45" text-anchor="middle" class="item-text" font-weight="800" fill="#064E3B">端侧脱敏清洗中心</text>
        <text x="87" y="75" text-anchor="middle" class="item-text">文本语义对齐校验</text>
        <text x="87" y="95" text-anchor="middle" class="item-text">特征指纹生成存证</text>
    </g>

    <g transform="translate(225, 70)">
        <rect width="180" height="115" class="box-highlight" stroke="#10B981"/>
        <text x="90" y="45" text-anchor="middle" class="item-text" font-weight="800" fill="#065F46">专家多端复核标注</text>
        <text x="90" y="75" text-anchor="middle" class="item-text" fill="#065F46">案例研判复核与二次标记</text>
        <text x="90" y="95" text-anchor="middle" class="item-text" fill="#065F46">反向驱动 RAG 权重进化</text>
    </g>
  </g>

  <!-- Bottom Left: Knowledge Base (Indigo Domain) -->
  <g transform="translate(60, 365)">
    <rect width="430" height="445" rx="16" ry="16" class="bento-card" stroke="#6366F1"/>
    <path d="M 0 16 Q 0 0 16 0 L 334 0 Q 350 0 350 16 L 350 45 L 0 45 Z" class="bento-header" fill="url(#grad-indigo)" stroke="#6366F1"/>
    <text x="20" y="28" class="bento-title" fill="#F8FAFC">核心反诈知识底座 (Repository)</text>

    <g transform="translate(30, 75)">
        <rect width="370" height="100" class="box"/>
        <text x="185" y="42" text-anchor="middle" class="item-text" font-weight="800" fill="#4338CA">案件持久化索引 (SQLite)</text>
        <text x="185" y="72" text-anchor="middle" class="item-text">支持分级风险流水的全量溯源与特征检索</text>
    </g>

    <g transform="translate(30, 195)">
        <rect width="370" height="100" class="box-highlight" stroke="#6366F1"/>
        <text x="185" y="42" text-anchor="middle" class="item-text" font-weight="800" fill="#4338CA">高维语义矢量库 (Vector)</text>
        <text x="185" y="72" text-anchor="middle" class="item-text" fill="#4338CA">实现毫秒级的跨场景相关性知识召回系统</text>
    </g>

    <g transform="translate(30, 315)">
        <rect width="370" height="110" class="box"/>
        <text x="25" y="32" class="item-text" font-weight="800" fill="#1E293B">反诈场景语义知识图谱</text>
        <text x="40" y="65" class="item-text">• 自动化诈骗场景诱导链路推理 (Reasoning)</text>
        <text x="40" y="90" class="item-text">• 全场景动态判研指纹与画像 (Profiling)</text>
    </g>
  </g>

  <!-- Bottom Right: Platform Ops (Slate/Amber Domain) -->
  <g transform="translate(510, 365)">
    <rect width="430" height="445" rx="16" ry="16" class="bento-card" stroke="#64748B"/>
    <path d="M 0 16 Q 0 0 16 0 L 234 0 Q 250 0 250 16 L 250 45 L 0 45 Z" class="bento-header" fill="#F1F5F9" stroke="#64748B"/>
    <text x="20" y="28" class="bento-title" fill="#334155">平台运营与服务架构 (Operations)</text>

    <g transform="translate(30, 75)">
        <rect width="175" height="155" class="box"/>
        <text x="87" y="45" text-anchor="middle" class="item-text" font-weight="800">治理看板 BI</text>
        <text x="87" y="80" text-anchor="middle" class="item-text">展现全域研判数据</text>
        <text x="87" y="105" text-anchor="middle" class="item-text">及攻击态势汇总</text>
    </g>

    <g transform="translate(225, 75)">
        <rect width="180" height="155" class="box-highlight" stroke="#F59E0B" stroke-width="2"/>
        <text x="90" y="45" text-anchor="middle" class="item-text" font-weight="800" fill="#92400E">全域风险动态地图</text>
        <text x="90" y="80" text-anchor="middle" class="item-text" fill="#92400E">可视化风险地理聚集</text>
        <text x="90" y="105" text-anchor="middle" class="item-text" fill="#92400E">动态预警轨迹全息透视</text>
    </g>

    <g transform="translate(30, 250)">
        <rect width="375" height="165" class="box" stroke="#3B82F6" stroke-width="2"/>
        <text x="25" y="32" class="item-text" font-weight="800" fill="#1D4ED8">前台 RAG 供能中心</text>
        <text x="40" y="70" class="item-text" fill="#1D4ED8">• 输出极低延迟的反诈判研报告接口</text>
        <text x="40" y="95" class="item-text" fill="#1D4ED8">• 针对新型骗术特征实现策略“热更新”</text>
        <text x="40" y="120" class="item-text" fill="#1D4ED8">• 为端侧主智能体提供深度语义知识增强</text>
    </g>
  </g>

</svg>
