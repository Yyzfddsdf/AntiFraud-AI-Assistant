<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="950" viewBox="0 0 1000 950">
  <defs>
    <linearGradient id="layer-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer-rose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4E6;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <style type="text/css">
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .layer-card { rx: 24; ry: 24; }
    .module-card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.2; rx: 16; ry: 16; }
    .node-title { font-family: "PingFang SC", sans-serif; font-size: 15px; font-weight: 800; fill: #1E293B; }
    .node-desc { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #64748B; }
    .step-num { font-family: "PingFang SC", sans-serif; font-size: 24px; font-weight: 900; fill: #94A3B8; opacity: 0.3; }
    .flow-path { stroke: #3B82F6; stroke-width: 6; fill: none; stroke-linecap: round; marker-end: url(#arrow-blue); opacity: 0.2; }
  </style>

  <rect width="1000" height="950" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">Android端主动识别与多端联动响应模型</text>

  <!-- LAYER 1: SENSING (BLUE) -->
  <g transform="translate(50, 110)">
    <rect width="900" height="200" class="layer-card" fill="url(#layer-blue)" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="30" y="35" class="step-num">01</text>
    <text x="75" y="32" class="node-title" fill="#1D4ED8">隐私感知与自适应采集层 (Perception)</text>
    <g transform="translate(40, 60)">
        <rect width="380" height="110" class="module-card"/>
        <text x="25" y="35" class="node-title">全量视图文本遍历</text>
        <text x="25" y="65" class="node-desc">• 提取 UI 节点文本与元素指纹</text>
        <text x="25" y="85" class="node-desc">• 面向原生权限的极速响应侦测</text>
    </g>
    <g transform="translate(480, 60)">
        <rect width="380" height="110" class="module-card"/>
        <text x="25" y="35" class="node-title">安全域截图 OCR 补偿</text>
        <text x="25" y="65" class="node-desc">• 针对重点页面的物理特征抓取</text>
        <text x="25" y="88" class="node-desc">• 支持本地离线特征化转换</text>
    </g>
  </g>

  <line x1="500" y1="310" x2="500" y2="340" class="flow-path"/>

  <!-- LAYER 2: ANALYSIS (EMERALD) -->
  <g transform="translate(50, 360)">
    <rect width="900" height="260" class="layer-card" fill="url(#layer-emerald)" stroke="#A7F3D0" stroke-width="1.5"/>
    <text x="30" y="35" class="step-num">02</text>
    <text x="75" y="32" class="node-title" fill="#065F46">分级冲突判研与逻辑演进层 (Diagnosis)</text>
    <g transform="translate(40, 60)">
        <rect width="380" height="150" class="module-card" stroke="#10B981" stroke-width="2"/>
        <text x="25" y="35" class="node-title" fill="#065F46">快速离线特征匹配</text>
        <text x="25" y="65" class="node-desc">• 捕获关键词库触发判研</text>
        <text x="25" y="90" class="node-desc">• 确定风险倾向 (Risk Bias)</text>
        <rect x="25" y="110" width="330" height="25" rx="4" fill="#F0FDF4"/>
        <text x="190" y="127" text-anchor="middle" class="node-desc" font-weight="900" fill="#10B981">自动转入深度解析导流 &gt;&gt;</text>
    </g>
    <g transform="translate(480, 60)">
        <rect width="380" height="150" class="module-card" stroke="#3B82F6" stroke-width="2.5"/>
        <text x="25" y="35" class="node-title" fill="#1D4ED8">主智能体全模态判研</text>
        <text x="25" y="65" class="node-desc">• 协调模态专家 Agent 组进行全量逻辑推演</text>
        <text x="25" y="90" class="node-desc">• 对诱导路径进行关联分析与样本碰撞</text>
        <text x="25" y="115" class="node-desc" font-weight="900" fill="#3B82F6">输出分级评分与响应策略库</text>
    </g>
  </g>

  <line x1="500" y1="620" x2="500" y2="650" class="flow-path"/>

  <!-- LAYER 3: RESPONSE (ROSE) - NO AUTO INTERCEPT -->
  <g transform="translate(50, 670)">
    <rect width="900" height="250" class="layer-card" fill="url(#layer-rose)" stroke="#FECDD3" stroke-width="1.5"/>
    <text x="30" y="35" class="step-num">03</text>
    <text x="75" y="32" class="node-title" fill="#9F1239">分级风险预警与多端引导层 (Response)</text>
    <g transform="translate(40, 70)">
        <rect width="380" height="130" class="module-card"/>
        <text x="25" y="35" class="node-title" fill="#065F46">常态化安全巡检</text>
        <text x="25" y="65" class="node-desc">• 低风险状态静默监测</text>
        <text x="25" y="85" class="node-desc">• 定期上云同步环境指纹</text>
    </g>
    <g transform="translate(480, 70)">
        <rect width="400" height="150" class="module-card" stroke="#EF4444" stroke-width="2.5"/>
        <text x="25" y="35" class="node-title" fill="#B91C1C">全域风险同步与防护引导</text>
        <text x="25" y="65" class="node-desc" font-weight="900" fill="#EF4444">1. 向用户发送悬浮盾强提醒</text>
        <text x="25" y="85" class="node-desc" font-weight="900" fill="#EF4444">2. 自动开启多模态告警弹窗</text>
        <text x="25" y="105" class="node-desc" font-weight="900" fill="#EF4444">3. 触发家庭联防守护人远程干预</text>
    </g>
  </g>

</svg>
