<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="850" viewBox="0 0 1000 850">
  <defs>
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-mixed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
  </defs>

  <style type="text/css">
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 14px; fill: #64748B; }
    .side-panel { fill: #FFFFFF; stroke-width: 1.5; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.03)); }
    .header-indigo { fill: url(#grad-indigo); stroke: #C7D2FE; stroke-width: 1.5; }
    .header-emerald { fill: url(#grad-emerald); stroke: #A7F3D0; stroke-width: 1.5; }
    .node-title { font-family: "PingFang SC", sans-serif; font-size: 15px; font-weight: 800; fill: #1E293B; }
    .node-desc { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #475569; }
    .box { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.2; rx: 16; ry: 16; }
    .box-highlight { fill: #FFFFFF; stroke-width: 2; rx: 16; ry: 16; }
    .hub-box { fill: #FFFFFF; stroke: url(#grad-mixed); stroke-width: 3; rx: 20; ry: 20; filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.1)); }
    .line-indigo { stroke: #6366F1; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .line-emerald { stroke: #10B981; stroke-width: 2.5; fill: none; stroke-linecap: round; }
  </style>

  <rect width="1000" height="850" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">“云端智脑+端侧守护”双重防护架构</text>

  <!-- Left Side: Global Intelligence (Indigo) -->
  <g transform="translate(60, 135)">
    <rect width="420" height="560" rx="16" ry="16" class="side-panel" stroke="#C7D2FE"/>
    <path d="M 0 16 Q 0 0 16 0 L 404 0 Q 420 0 420 16 L 420 45 L 0 45 Z" class="header-indigo"/>
    <text x="210" y="28" text-anchor="middle" class="node-title" fill="#4338CA">1. 全局智慧防护网 (Cloud Intelligence)</text>
    
    <g transform="translate(30, 75)">
        <rect width="360" height="110" class="box"/>
        <text x="20" y="35" class="node-title" fill="#4338CA">反诈知识库溯源 (RAG)</text>
        <text x="20" y="65" class="node-desc">覆盖全国千万级电信诈骗案例索引、</text>
        <text x="20" y="80" class="node-desc">实时关联法律法规与社区举报特征</text>
    </g>

    <g transform="translate(30, 210)">
        <rect width="360" height="150" class="box-highlight" stroke="#6366F1"/>
        <text x="20" y="35" class="node-title" fill="#4338CA">云端专家审核联动系统</text>
        <text x="20" y="65" class="node-desc">• 管理端对可疑特征的人工/AI 复合判研</text>
        <text x="20" y="90" class="node-desc">• 持续优化针对新型话术的语义识别精度</text>
        <text x="20" y="115" class="node-desc">• 建立云端与端侧权重动态同步机制</text>
    </g>

    <g transform="translate(30, 385)">
        <rect width="360" height="150" class="box"/>
        <text x="20" y="35" class="node-title" fill="#4338CA">多维威胁特征库与图谱</text>
        <text x="20" y="65" class="node-desc">• 诈骗人黑名单/黑产账号库实时更新</text>
        <text x="20" y="90" class="node-desc">• 基于知识图谱的语义诱导全链路识别</text>
        <text x="20" y="115" class="node-desc">• 深度预测诈骗演化趋势与话术节点</text>
    </g>
  </g>

  <!-- Right Side: Personal Portal (Emerald) -->
  <g transform="translate(520, 135)">
    <rect width="420" height="560" rx="16" ry="16" class="side-panel" stroke="#A7F3D0"/>
    <path d="M 0 16 Q 0 0 16 0 L 404 0 Q 420 0 420 16 L 420 45 L 0 45 Z" class="header-emerald"/>
    <text x="210" y="28" text-anchor="middle" class="node-title" fill="#065F46">2. 个人端侧守护网 (Personal Privacy)</text>
    
    <g transform="translate(30, 75)">
        <rect width="360" height="110" class="box"/>
        <text x="20" y="35" class="node-title" fill="#065F46">实时隐私侦测 (Accessibility)</text>
        <text x="20" y="65" class="node-desc">基于原生权限的动态屏幕文本抓取、</text>
        <text x="20" y="80" class="node-desc">全场景行为嗅探与非典型操作识别</text>
    </g>

    <g transform="translate(30, 210)">
        <rect width="360" height="150" class="box-highlight" stroke="#10B981"/>
        <text x="20" y="35" class="node-title" fill="#065F46">本地数据脱敏与特征化</text>
        <text x="20" y="65" class="node-desc">• 本地 OCR 离线执行，确保截图不出设备</text>
        <text x="20" y="90" class="node-desc">• 对银行转账等核心场景进行上下文预处理</text>
        <text x="20" y="115" class="node-desc">• 采用“最小化上云”原则，仅回传抽象特征</text>
    </g>

    <g transform="translate(30, 385)">
        <rect width="360" height="150" class="box"/>
        <text x="20" y="35" class="node-title" fill="#065F46">个体实时行为画像分析</text>
        <text x="20" y="65" class="node-desc">• 检测用户受诱导转账时的操作偏差</text>
        <text x="20" y="90" class="node-desc">• 构建局部隐私记忆，实现实时分级判定</text>
        <text x="20" y="115" class="node-desc">• 守护人本地行为模式对齐与离阈识别</text>
    </g>
  </g>

  <!-- CONVERGENCE HUB (BOTTOM CENTER) - FIXED COLOR CONTRAST -->
  <g transform="translate(300, 740)">
    <rect width="400" height="80" rx="20" class="hub-box"/>
    <text x="200" y="48" text-anchor="middle" class="node-title" font-size="20" fill="#1E293B">多维融合创新决策中心</text>
  </g>

  <!-- CONVERGENCE ARROWS (Smooth Curves) -->
  <path d="M 270 695 Q 270 755 350 775" class="line-indigo" marker-end="url(#arrow-indigo)"/>
  <text x="290" y="740" class="node-desc" fill="#6366F1" font-weight="900">云端证据</text>

  <path d="M 730 695 Q 730 755 650 775" class="line-emerald" marker-end="url(#arrow-emerald)"/>
  <text x="650" y="740" class="node-desc" fill="#10B981" font-weight="900">端侧状态</text>

</svg>
