<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <symbol id="icon-shield" viewBox="0 0 24 24">
      <path d="M12 2L4 5V11C4 16.19 7.41 21.05 12 22.33C16.59 21.05 20 16.19 20 11V5L12 2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <style>
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 15px; fill: #64748B; }
    .core-node { fill: url(#grad-indigo); stroke: #3730A3; stroke-width: 3; filter: url(#shadow); }
    .core-text { font-family: "PingFang SC", sans-serif; font-size: 18px; font-weight: 700; fill: #FFFFFF; }
    .module-card { fill: #FFFFFF; stroke-width: 2; filter: url(#shadow); }
    .module-title { font-family: "PingFang SC", sans-serif; font-size: 15px; font-weight: 700; }
    .module-desc { font-family: "PingFang SC", sans-serif; font-size: 12px; fill: #64748B; }
    .connector { stroke: #CBD5E1; stroke-width: 1.5; stroke-dasharray: 6 4; fill: none; }
    .flow-line { stroke: #10B981; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1000" height="850" class="bg"/>
  <text x="500" y="60" text-anchor="middle" class="title">反诈卫士 (Sentinel AI) - 核心创新机制</text>

  <!-- Central Core -->
  <circle cx="500" cy="425" r="95" class="core-node"/>
  <text x="500" y="420" text-anchor="middle" class="core-text">核心引擎</text>
  <text x="500" y="445" text-anchor="middle" class="core-text" font-size="14">AI 判研总控</text>

  <!-- INNOVATION MODULES -->
  <!-- M1: Multimodal (Violet) -->
  <g transform="translate(400, 150)">
    <rect width="200" height="100" rx="16" class="module-card" stroke="#8B5CF6"/>
    <use href="#icon-shield" x="15" y="15" width="20" height="20" fill="#8B5CF6"/>
    <text x="105" y="40" text-anchor="middle" class="module-title" fill="#6D28D9">多模态联合分析</text>
    <text x="105" y="65" text-anchor="middle" class="module-desc">全轴向数据协同取证</text>
    <text x="105" y="82" text-anchor="middle" class="module-desc">深度判研隐匿风险</text>
  </g>

  <!-- M2: Dual Shield (Blue) -->
  <g transform="translate(700, 310)">
    <rect width="200" height="100" rx="16" class="module-card" stroke="#3B82F6"/>
    <use href="#icon-shield" x="15" y="15" width="20" height="20" fill="#3B82F6"/>
    <text x="105" y="40" text-anchor="middle" class="module-title" fill="#1D4ED8">双重防护网</text>
    <text x="105" y="65" text-anchor="middle" class="module-desc">全量 RAG 知识库</text>
    <text x="105" y="82" text-anchor="middle" class="module-desc">+ 个性化语义记忆</text>
  </g>

  <!-- M3: Proactive Guardian (Emerald) -->
  <g transform="translate(580, 610)">
    <rect width="200" height="100" rx="16" class="module-card" stroke="#10B981"/>
    <use href="#icon-shield" x="15" y="15" width="20" height="20" fill="#10B981"/>
    <text x="105" y="40" text-anchor="middle" class="module-title" fill="#065F46">主动守护机制</text>
    <text x="105" y="65" text-anchor="middle" class="module-desc">底层主动侦测挂载</text>
    <text x="105" y="82" text-anchor="middle" class="module-desc">实时高危精准拦截</text>
  </g>

  <!-- M4: Family Defense (Amber) -->
  <g transform="translate(220, 610)">
    <rect width="200" height="100" rx="16" class="module-card" stroke="#F59E0B"/>
    <use href="#icon-shield" x="15" y="15" width="20" height="20" fill="#F59E0B"/>
    <text x="105" y="40" text-anchor="middle" class="module-title" fill="#92400E">家庭联防体系</text>
    <text x="105" y="65" text-anchor="middle" class="module-desc">跨端风险同步广播</text>
    <text x="105" y="82" text-anchor="middle" class="module-desc">守护端远程强交互</text>
  </g>

  <!-- M5: Evolution (Rose) -->
  <g transform="translate(100, 310)">
    <rect width="200" height="100" rx="16" class="module-card" stroke="#F43F5E"/>
    <use href="#icon-shield" x="15" y="15" width="20" height="20" fill="#F43F5E"/>
    <text x="105" y="40" text-anchor="middle" class="module-title" fill="#BE123C">持续进化机制</text>
    <text x="105" y="65" text-anchor="middle" class="module-desc">闭环判研入库治理</text>
    <text x="105" y="82" text-anchor="middle" class="module-desc">全场景知识动态生长</text>
  </g>

  <!-- Connectors (Smooth Curves) -->
  <path d="M 500 330 Q 500 290 500 250" class="connector"/>
  <path d="M 575 375 Q 640 360 700 360" class="connector"/>
  <path d="M 555 500 Q 600 550 640 610" class="connector"/>
  <path d="M 445 500 Q 400 550 360 610" class="connector"/>
  <path d="M 425 375 Q 360 360 300 360" class="connector"/>

  <!-- Ring Flow Lines (Animated Aesthetic Flow) -->
  <path d="M 600 200 Q 750 220 780 310" class="flow-line" marker-end="url(#arrow-emerald)"/>
  <path d="M 800 410 Q 780 570 680 610" class="flow-line" marker-end="url(#arrow-emerald)"/>
  <path d="M 580 710 Q 500 735 420 710" class="flow-line" marker-end="url(#arrow-emerald)"/>
  <path d="M 320 610 Q 250 570 220 410" class="flow-line" marker-end="url(#arrow-emerald)"/>
  <path d="M 220 310 Q 250 220 400 200" class="flow-line" marker-end="url(#arrow-emerald)"/>

</svg>

