<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.05"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <!-- Shield Icon Symbol -->
    <symbol id="icon-shield" viewBox="0 0 24 24">
      <path d="M12 2L4 5V11C4 16.19 7.41 21.05 12 22.33C16.59 21.05 20 16.19 20 11V5L12 2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9 12L11 14L15 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <style>
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 26px; font-weight: 700; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 15px; fill: #64748B; }
    .layer-bg { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; filter: url(#shadow); }
    .layer-header { fill: #F1F5F9; stroke: #E2E8F0; stroke-width: 1; }
    .layer-title { font-family: "PingFang SC", sans-serif; font-size: 14px; font-weight: 600; fill: #475569; }
    .card { fill: #FFFFFF; stroke: #F1F5F9; stroke-width: 1; }
    .card-title { font-family: "PingFang SC", sans-serif; font-size: 13px; font-weight: 600; fill: #1E293B; }
    .card-desc { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #94A3B8; }
    .line { stroke: #CBD5E1; stroke-width: 1.5; fill: none; }
    .icon { color: #10B981; }
  </style>

  <rect width="1000" height="850" class="bg"/>
  <text x="500" y="50" text-anchor="middle" class="title">反诈卫士 (Sensible AI) - 系统总体架构</text>
  <text x="500" y="80" text-anchor="middle" class="subtitle">展示用户交互层、业务服务层与数据治理层的核心联动循环</text>

  <!-- LAYER 1: USER INTERACTION -->
  <rect x="50" y="120" width="900" height="150" rx="12" class="layer-bg"/>
  <path d="M 50 132 Q 50 120 62 120 L 210 120 L 210 150 L 50 150 Z" class="layer-header"/>
  <text x="130" y="140" text-anchor="middle" class="layer-title">1. 用户交互层</text>

  <!-- User Nodes -->
  <rect x="250" y="170" width="160" height="60" rx="8" class="card"/>
  <use href="#icon-shield" x="260" y="180" width="16" height="16" class="icon"/>
  <text x="330" y="195" text-anchor="middle" class="card-title">移动端 (Mobile)</text>
  <text x="330" y="210" text-anchor="middle" class="card-desc">分析查询 / 聊天 / 模拟</text>

  <rect x="550" y="170" width="160" height="60" rx="8" class="card"/>
  <use href="#icon-shield" x="560" y="180" width="16" height="16" class="icon"/>
  <text x="630" y="195" text-anchor="middle" class="card-title">Android 原生</text>
  <text x="630" y="210" text-anchor="middle" class="card-desc">主动守护 / 悬浮快判</text>

  <!-- LAYER 2: BUSINESS SERVICES -->
  <rect x="50" y="300" width="900" height="280" rx="12" class="layer-bg"/>
  <path d="M 50 312 Q 50 300 62 300 L 210 300 L 210 330 L 50 330 Z" class="layer-header"/>
  <text x="130" y="320" text-anchor="middle" class="layer-title">2. 业务服务层</text>

  <!-- Service Nodes -->
  <rect x="100" y="360" width="160" height="70" rx="8" class="card"/>
  <text x="180" y="385" text-anchor="middle" class="card-title">多模态编排</text>
  <text x="180" y="405" text-anchor="middle" class="card-desc">四类模态并发取证</text>

  <rect x="300" y="360" width="160" height="70" rx="8" class="card" stroke="#10B981" stroke-width="1.5"/>
  <text x="380" y="385" text-anchor="middle" class="card-title">主智能体 RAG</text>
  <text x="380" y="405" text-anchor="middle" class="card-desc">全局 + 个人记忆召回</text>

  <rect x="500" y="360" width="160" height="70" rx="8" class="card"/>
  <text x="580" y="385" text-anchor="middle" class="card-title">分析中心</text>
  <text x="580" y="405" text-anchor="middle" class="card-desc">评分 / 判级 / 报告</text>

  <rect x="700" y="360" width="160" height="70" rx="8" class="card"/>
  <text x="780" y="385" text-anchor="middle" class="card-title">预警中心</text>
  <text x="780" y="405" text-anchor="middle" class="card-desc">家庭联防 / WS 推送</text>

  <rect x="300" y="470" width="160" height="70" rx="8" class="card"/>
  <text x="380" y="495" text-anchor="middle" class="card-title">模拟训练</text>
  <text x="380" y="515" text-anchor="middle" class="card-desc">动态题包 / 意识评测</text>

  <rect x="500" y="470" width="160" height="70" rx="8" class="card"/>
  <text x="580" y="495" text-anchor="middle" class="card-title">聊天助手</text>
  <text x="580" y="515" text-anchor="middle" class="card-desc">反诈问答 / 辅助决策</text>

  <!-- LAYER 3: DATA & GOVERNANCE -->
  <rect x="50" y="620" width="900" height="180" rx="12" class="layer-bg"/>
  <path d="M 50 632 Q 50 620 62 620 L 210 620 L 210 650 L 50 650 Z" class="layer-header"/>
  <text x="130" y="640" text-anchor="middle" class="layer-title">3. 数据与治理层</text>

  <rect x="150" y="680" width="160" height="70" rx="8" class="card"/>
  <text x="230" y="705" text-anchor="middle" class="card-title">业务数据库</text>
  <text x="230" y="725" text-anchor="middle" class="card-desc">用户 / 任务 / 归档</text>

  <rect x="350" y="680" width="160" height="70" rx="8" class="card"/>
  <text x="430" y="705" text-anchor="middle" class="card-title">案例知识库</text>
  <text x="430" y="725" text-anchor="middle" class="card-desc">历史沉淀 / 待审核库</text>

  <rect x="550" y="680" width="160" height="70" rx="8" class="card"/>
  <text x="630" y="705" text-anchor="middle" class="card-title">向量持久化</text>
  <text x="630" y="725" text-anchor="middle" class="card-desc">个人记忆全量索引</text>

  <rect x="750" y="680" width="160" height="70" rx="8" class="card"/>
  <text x="830" y="705" text-anchor="middle" class="card-title">治理端 (Web)</text>
  <text x="830" y="725" text-anchor="middle" class="card-desc">审核 / 统计 / 地图</text>

  <!-- Connection Lines -->
  <path d="M 330 230 L 330 300" class="line" marker-end="url(#arrow)"/>
  <path d="M 630 230 L 630 300" class="line" marker-end="url(#arrow)"/>
  <path d="M 260 395 L 300 395" class="line" marker-end="url(#arrow)"/>
  <path d="M 460 395 L 500 395" class="line" marker-end="url(#arrow)"/>
  <path d="M 660 395 L 700 395" class="line" marker-end="url(#arrow)"/>
  
  <path d="M 230 580 L 230 620" class="line" marker-end="url(#arrow)"/>
  <path d="M 430 580 L 430 620" class="line" marker-end="url(#arrow)"/>
  <path d="M 630 580 L 630 620" class="line" marker-end="url(#arrow)"/>
</svg>
