<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <symbol id="icon-shield" viewBox="0 0 24 24">
      <path d="M12 2L4 5V11C4 16.19 7.41 21.05 12 22.33C16.59 21.05 20 16.19 20 11V5L12 2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9 12L11 14L15 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 14px; fill: #64748B; }
    .bento-card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.5; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.04)); }
    .bento-header { stroke: #E2E8F0; stroke-width: 1; }
    .bento-title { font-family: "PingFang SC", sans-serif; font-size: 14px; font-weight: 700; fill: #1E293B; }
    .item-text { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #475569; }
    .highlight-text { font-family: "PingFang SC", sans-serif; font-size: 13px; font-weight: 700; fill: #6366F1; }
    .line-blue { stroke: #3B82F6; stroke-width: 1.8; stroke-dasharray: 4 2; fill: none; stroke-linejoin: round; }
    .line-indigo { stroke: #6366F1; stroke-width: 2; fill: none; stroke-linejoin: round; }
  </style>

  <rect width="1000" height="850" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">数据驱动-全场景反诈守护系统</text>

  <!-- Top Row: Terminal Interface -->
  <!-- User App (Blue) -->
  <g transform="translate(60, 110)">
    <rect width="280" height="150" rx="12" class="bento-card" stroke="#3B82F6"/>
    <path d="M 0 12 Q 0 0 12 0 L 268 0 Q 280 0 280 12 L 280 40 L 0 40 Z" class="bento-header" fill="url(#grad-blue)"/>
    <text x="140" y="25" text-anchor="middle" class="bento-title" fill="#1D4ED8">用户移动端 (Vue/SFC)</text>
    <text x="25" y="70" class="item-text">• 反诈分析交互主入口</text>
    <text x="25" y="95" class="item-text">• 实时咨询与全景报告</text>
    <text x="25" y="120" class="item-text">• 家庭防线风险同步显示</text>
  </g>

  <!-- Control Web (Blue-Slate) -->
  <g transform="translate(360, 110)">
    <rect width="280" height="150" rx="12" class="bento-card" stroke="#64748B"/>
    <path d="M 0 12 Q 0 0 12 0 L 268 0 Q 280 0 280 12 L 280 40 L 0 40 Z" class="bento-header" fill="#F1F5F9"/>
    <text x="140" y="25" text-anchor="middle" class="bento-title">治理控制台 (React/Web)</text>
    <text x="25" y="70" class="item-text">• 诈骗案例专家库研判治理</text>
    <text x="25" y="95" class="item-text">• 全局反诈知识图谱可视化</text>
    <text x="25" y="120" class="item-text">• 动态预警地图与流量分析</text>
  </g>

  <!-- Android Native (Emerald) -->
  <g transform="translate(660, 110)">
    <rect width="280" height="150" rx="12" class="bento-card" stroke="#10B981" stroke-width="2"/>
    <path d="M 0 12 Q 0 0 12 0 L 268 0 Q 280 0 280 12 L 280 40 L 0 40 Z" class="bento-header" fill="url(#grad-emerald)"/>
    <text x="140" y="25" text-anchor="middle" class="bento-title" fill="#065F46">Android 原生端守护 (APK)</text>
    <text x="25" y="70" class="item-text">• 全轴向系统级风险感知</text>
    <text x="25" y="95" class="item-text">• 无障碍权限主动侦测引擎</text>
    <text x="25" y="120" class="item-text">• 底层高危操作实时拦截</text>
  </g>

  <!-- Middle: Core AI Engine (Indigo Theme) -->
  <g transform="translate(60, 280)">
    <rect width="580" height="510" rx="16" class="bento-card" stroke="#6366F1" stroke-width="2"/>
    <path d="M 0 16 Q 0 0 16 0 L 564 0 Q 580 0 580 16 L 580 45 L 0 45 Z" class="bento-header" fill="url(#grad-indigo)"/>
    <text x="290" y="28" text-anchor="middle" class="bento-title" fill="#4338CA" font-size="16">核心业务逻辑层 (Multi-Agent Engine)</text>
    
    <!-- Sub-blocks: Multi-Agent -->
    <rect x="20" y="65" width="540" height="185" rx="10" fill="#FDFDFF" stroke="#E0E7FF" stroke-width="1.5"/>
    <use href="#icon-shield" x="35" y="82" width="22" height="22" fill="#6366F1"/>
    <text x="70" y="98" class="highlight-text">多智能体分级分析编排系统</text>
    <text x="45" y="135" class="item-text">1. 实体提取 Agent: 关键转账要素/话术模型锁定</text>
    <text x="45" y="160" class="item-text">2. 意图分析 Agent: 跨页面诈骗诱导链路深度挖掘</text>
    <text x="45" y="185" class="item-text">3. 风险评分 Agent: 构建 [1级-5级] 动态量化风险矩阵</text>
    <text x="45" y="210" class="item-text">4. 预演生成 Agent: 自动生成多模态干预推演报告</text>
    <rect x="420" y="75" width="120" height="160" rx="8" fill="#EEF2FF"/>
    <text x="480" y="145" text-anchor="middle" class="item-text" font-weight="bold" fill="#6366F1">LLM 推理核心</text>
    <text x="480" y="165" text-anchor="middle" class="item-text" font-size="9">Gemini / GPT</text>

    <!-- Lower section: Dual Features -->
    <rect x="20" y="270" width="260" height="215" rx="10" fill="#F0F9FF" stroke="#BAE6FD"/>
    <text x="150" y="300" text-anchor="middle" class="bento-title" font-size="12" fill="#0369A1">RAG 反诈知识召回</text>
    <text x="40" y="340" class="item-text">• 海量骗术库语义对齐</text>
    <text x="40" y="370" class="item-text">• 实时法律法规动态增强</text>
    <text x="40" y="400" class="item-text">• 外部举报接口实时引入</text>

    <rect x="300" y="270" width="260" height="215" rx="10" fill="#FFFBEB" stroke="#FDE68A"/>
    <text x="430" y="300" text-anchor="middle" class="bento-title" font-size="12" fill="#92400E">家庭联防系统</text>
    <text x="320" y="340" class="item-text">• WebSocket 全局状态同步</text>
    <text x="320" y="370" class="item-text">• 守护人多端核验机制</text>
    <text x="320" y="400" class="item-text">• 高效拦截指令集分发</text>
  </g>

  <!-- Right: Storage & Infra (Cyan/Slate) -->
  <g transform="translate(660, 280)">
    <rect width="280" height="245" rx="12" class="bento-card" stroke="#0891B2"/>
    <path d="M 0 12 Q 0 0 12 0 L 268 0 Q 280 0 280 12 L 280 40 L 0 40 Z" class="bento-header" fill="#ECFEFF"/>
    <text x="140" y="25" text-anchor="middle" class="bento-title" fill="#0E7490">持久化与向量库</text>
    <text x="25" y="75" class="item-text">• PgVector 语义向量检索层</text>
    <text x="25" y="110" class="item-text">• SQLite 核心业务数据库</text>
    <text x="25" y="145" class="item-text">• Redis 活跃会话高速缓存</text>
    <text x="25" y="180" class="item-text">• 对象存储级多模态底座</text>
  </g>

  <g transform="translate(660, 545)">
    <rect width="280" height="245" rx="12" class="bento-card" stroke="#64748B"/>
    <path d="M 0 12 Q 0 0 12 0 L 268 0 Q 280 0 280 12 L 280 40 L 0 40 Z" class="bento-header" fill="#F8FAFC"/>
    <text x="140" y="25" text-anchor="middle" class="bento-title" fill="#334155">平台底座设施</text>
    <text x="25" y="75" class="item-text">• 全局实时事件总线 (WS)</text>
    <text x="25" y="110" class="item-text">• 统一大模型 API 中继中台</text>
    <text x="25" y="145" class="item-text">• 云原生 Kubernetes/Docker</text>
    <text x="25" y="180" class="item-text">• 实时 Prometheus 健康监测</text>
  </g>

  <!-- Decorative Connections (Curved) -->
  <path d="M 500 260 Q 500 270 500 280" class="line-blue" marker-end="url(#arrow-blue)"/>
  <path d="M 200 260 Q 200 270 200 280" class="line-blue" marker-end="url(#arrow-blue)"/>
  <path d="M 800 260 Q 800 270 800 280" class="line-emerald" marker-end="url(#arrow-emerald)"/>
  <path d="M 640 400 Q 650 400 660 400" class="line-indigo" marker-end="url(#arrow-blue)"/>

</svg>
