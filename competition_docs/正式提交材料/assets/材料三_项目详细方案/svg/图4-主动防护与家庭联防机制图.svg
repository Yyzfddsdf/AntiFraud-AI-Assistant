<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="fastGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="slowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-light" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#34D399"/>
    </marker>
  </defs>

  <style>
    .font-sans { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 28px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-size: 15px; fill: #64748B; }
    
    .card-title { font-size: 18px; font-weight: 800; }
    .item-title { font-size: 15px; font-weight: 800; fill: #1E293B; }
    .item-desc { font-size: 13px; fill: #475569; }
    
    .tag-text { font-size: 12px; font-weight: 800; }
  </style>

  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  <text x="600" y="50" text-anchor="middle" class="font-sans title">主动防护与家庭联防机制图</text>
  <text x="600" y="80" text-anchor="middle" class="font-sans subtitle">系统静默初筛与用户主动求证双轨协同，融合后端四维处置联动体系</text>

  <g transform="translate(60, 230)" filter="url(#shadow)">
    <rect width="160" height="80" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="80" cy="25" r="5" fill="#94A3B8"/>
    <text x="80" y="52" text-anchor="middle" class="font-sans item-title">接触可疑信息</text>
    <text x="80" y="70" text-anchor="middle" class="font-sans item-desc" font-size="12">页面内容 / 聊天 / 短信</text>
  </g>

  <path d="M 220 270 C 260 270, 260 195, 316 195" fill="none" stroke="#93C5FD" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <rect x="230" y="215" width="70" height="22" rx="11" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="265" y="231" text-anchor="middle" class="font-sans tag-text" fill="#2563EB">系统静默</text>

  <path d="M 220 270 C 260 270, 260 385, 316 385" fill="none" stroke="#6EE7B7" stroke-width="3" marker-end="url(#arrow-green)"/>
  <rect x="230" y="340" width="70" height="22" rx="11" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="265" y="356" text-anchor="middle" class="font-sans tag-text" fill="#059669">主动提交</text>

  <g transform="translate(320, 140)" filter="url(#shadow)">
    <rect width="280" height="110" rx="16" fill="url(#fastGrad)" stroke="#93C5FD" stroke-width="2"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#2563EB"/>
    <text x="32" y="36" class="font-sans card-title" fill="#1D4ED8">本地快路径 (自动响应)</text>
    <text x="20" y="70" class="font-sans item-desc">• 端侧轻量级特征初步静默匹配</text>
    <text x="20" y="92" class="font-sans item-desc">• 针对明显风险触发即时阻断与提醒</text>
  </g>

  <g transform="translate(320, 330)" filter="url(#shadow)">
    <rect width="280" height="110" rx="16" fill="url(#slowGrad)" stroke="#6EE7B7" stroke-width="2"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#059669"/>
    <text x="32" y="36" class="font-sans card-title" fill="#047857">云端慢路径 (用户求证)</text>
    <text x="20" y="70" class="font-sans item-desc">• 用户主动提交图文/音视等复杂证据</text>
    <text x="20" y="92" class="font-sans item-desc">• 云端多模态深度分析并出具详细报告</text>
  </g>

  <line x1="460" y1="250" x2="460" y2="326" stroke="#94A3B8" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <rect x="365" y="275" width="190" height="26" rx="13" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="460" y="293" text-anchor="middle" class="font-sans tag-text" fill="#1D4ED8">👤 用户点击按钮发起深度求证</text>

  <path d="M 600 195 L 680 195" fill="none" stroke="#CBD5E1" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 600 385 L 680 385" fill="none" stroke="#CBD5E1" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(700, 140)" filter="url(#shadow)">
    <rect width="440" height="300" rx="20" fill="url(#backendGrad)" stroke="#FDBA74" stroke-width="2"/>
    
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#EA580C"/>
    <text x="32" y="36" class="font-sans card-title" fill="#C2410C">云端深度融合与协同处置</text>
    <text x="32" y="58" class="font-sans item-desc" font-size="12">基于长短期记忆的后端联动体系</text>

    <g transform="translate(20, 80)">
      <rect width="190" height="90" rx="12" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5" filter="url(#shadow-light)"/>
      <circle cx="20" cy="25" r="4" fill="#F59E0B"/>
      <text x="32" y="30" class="font-sans item-title">1. 历史归档</text>
      <text x="20" y="55" class="font-sans item-desc">形成千人千面的</text>
      <text x="20" y="75" class="font-sans item-desc">持续性风险行为记录</text>
    </g>

    <g transform="translate(230, 80)">
      <rect width="190" height="90" rx="12" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5" filter="url(#shadow-light)"/>
      <circle cx="20" cy="25" r="4" fill="#EF4444"/>
      <text x="32" y="30" class="font-sans item-title">2. 重点干预</text>
      <text x="20" y="55" class="font-sans item-desc">基于分析等级识别高危</text>
      <text x="20" y="75" class="font-sans item-desc">触发云端定向阻断策略</text>
    </g>

    <g transform="translate(20, 190)">
      <rect width="190" height="90" rx="12" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5" filter="url(#shadow-light)"/>
      <circle cx="20" cy="25" r="4" fill="#8B5CF6"/>
      <text x="32" y="30" class="font-sans item-title">3. 家庭守护</text>
      <text x="20" y="55" class="font-sans item-desc">联动亲情账号跨端提醒</text>
      <text x="20" y="75" class="font-sans item-desc">形成多维度协同联防网</text>
    </g>

    <g transform="translate(230, 190)">
      <rect width="190" height="90" rx="12" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5" filter="url(#shadow-light)"/>
      <circle cx="20" cy="25" r="4" fill="#3B82F6"/>
      <text x="32" y="30" class="font-sans item-title">4. 治理支撑</text>
      <text x="20" y="55" class="font-sans item-desc">沉淀新型复杂受骗话术</text>
      <text x="20" y="75" class="font-sans item-desc">反哺全网公共经验知识库</text>
    </g>
  </g>
</svg>
