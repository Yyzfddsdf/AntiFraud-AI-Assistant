<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bgGrad)"/>

  <text x="600" y="55" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="800" fill="#0F172A">动态风险判断机制示意图</text>
  <text x="600" y="85" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748B">双重知识支撑与动态阈值调整</text>

  <g transform="translate(60, 130)" filter="url(#shadow)">
    <rect width="280" height="150" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#3B82F6"/>
    <text x="32" y="36" font-family="'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#1E293B">当前案件风险特征</text>
    
    <circle cx="26" cy="65" r="4" fill="#94A3B8"/>
    <text x="40" y="70" font-family="'PingFang SC', sans-serif" font-size="14" fill="#475569">诈骗话术与高危关键词</text>
    
    <circle cx="26" cy="90" r="4" fill="#94A3B8"/>
    <text x="40" y="95" font-family="'PingFang SC', sans-serif" font-size="14" fill="#475569">危险动作请求 (如转账/授权)</text>
    
    <circle cx="26" cy="115" r="4" fill="#94A3B8"/>
    <text x="40" y="120" font-family="'PingFang SC', sans-serif" font-size="14" fill="#475569">多模态证据融合强度</text>
  </g>

  <g transform="translate(60, 305)" filter="url(#shadow)">
    <rect width="280" height="100" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#8B5CF6"/>
    <text x="32" y="36" font-family="'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#1E293B">公共知识库支撑</text>
    
    <circle cx="26" cy="65" r="4" fill="#94A3B8"/>
    <text x="40" y="70" font-family="'PingFang SC', sans-serif" font-size="14" fill="#475569">历史案件知识库相似度比对</text>
  </g>

  <g transform="translate(60, 430)" filter="url(#shadow)">
    <rect width="280" height="120" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#10B981"/>
    <text x="32" y="36" font-family="'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#1E293B">用户个体历史支撑</text>
    
    <circle cx="26" cy="65" r="4" fill="#94A3B8"/>
    <text x="40" y="70" font-family="'PingFang SC', sans-serif" font-size="14" fill="#475569">用户个人历史相似经历检索</text>
    
    <circle cx="26" cy="95" r="4" fill="#94A3B8"/>
    <text x="40" y="100" font-family="'PingFang SC', sans-serif" font-size="14" fill="#475569">用户长期历史风险极性状态</text>
  </g>


  <g transform="translate(420, 210)" filter="url(#shadow)">
    <rect width="360" height="260" rx="20" fill="url(#coreGrad)" stroke="#93C5FD" stroke-width="2"/>
    
    <rect x="0" y="0" width="360" height="60" rx="20" fill="#3B82F6"/>
    <rect x="0" y="30" width="360" height="30" fill="#3B82F6"/> <text x="180" y="36" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">动态风险判断核心引擎</text>
    
    <rect x="60" y="85" width="240" height="40" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="180" y="111" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="14" font-weight="800" fill="#1E293B">1. 基础评分 (当前案件评估)</text>
    
    <path d="M 180 125 L 180 145" fill="none" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="60" y="145" width="240" height="40" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="180" y="171" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="14" font-weight="800" fill="#1E293B">2. 综合干预 (双重知识支撑)</text>

    <path d="M 180 185 L 180 205" fill="none" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="60" y="205" width="240" height="40" rx="8" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
    <text x="180" y="231" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="14" font-weight="800" fill="#1D4ED8">3. 越界比对 (动态阈值定级)</text>
  </g>


  <g transform="translate(860, 130)" filter="url(#shadow)">
    <rect width="280" height="110" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#64748B"/>
    <text x="32" y="36" font-family="'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#334155">低风险</text>
    
    <rect x="20" y="60" width="70" height="26" rx="6" fill="#E2E8F0"/>
    <text x="55" y="78" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="13" font-weight="800" fill="#475569">处置动作</text>
    <text x="100" y="78" font-family="'PingFang SC', sans-serif" font-size="14" font-weight="800" fill="#1E293B">给出防范建议</text>
  </g>

  <g transform="translate(860, 270)" filter="url(#shadow)">
    <rect width="280" height="110" rx="16" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#F59E0B"/>
    <text x="32" y="36" font-family="'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#B45309">中风险</text>
    
    <rect x="20" y="60" width="70" height="26" rx="6" fill="#FFEDD5"/>
    <text x="55" y="78" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="13" font-weight="800" fill="#C2410C">处置动作</text>
    <text x="100" y="78" font-family="'PingFang SC', sans-serif" font-size="14" font-weight="800" fill="#9A3412">主动警示提醒</text>
  </g>

  <g transform="translate(860, 410)" filter="url(#shadow)">
    <rect width="280" height="140" rx="16" fill="#FEF2F2" stroke="#FECACA" stroke-width="2"/>
    <rect x="20" y="20" width="4" height="20" rx="2" fill="#EF4444"/>
    <text x="32" y="36" font-family="'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#B91C1C">高风险</text>
    
    <rect x="20" y="60" width="70" height="26" rx="6" fill="#FEE2E2"/>
    <text x="55" y="78" text-anchor="middle" font-family="'PingFang SC', sans-serif" font-size="13" font-weight="800" fill="#B91C1C">处置动作</text>
    
    <text x="100" y="78" font-family="'PingFang SC', sans-serif" font-size="14" font-weight="800" fill="#7F1D1D">触发强提醒与跨端家庭联动</text>
    <text x="100" y="102" font-family="'PingFang SC', sans-serif" font-size="14" font-weight="800" fill="#7F1D1D">并进入历史库重点归档关注</text>
  </g>


  <path d="M 340 205 C 380 205, 380 280, 420 280" fill="none" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 340 355 L 420 355" fill="none" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 340 490 C 380 490, 380 400, 420 400" fill="none" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <path d="M 780 340 C 820 340, 820 185, 860 185" fill="none" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 780 340 C 820 340, 820 325, 860 325" fill="none" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 780 340 C 820 340, 820 480, 860 480" fill="none" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#arrow)"/>

</svg>
