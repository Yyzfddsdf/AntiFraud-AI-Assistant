<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 740">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    
    <linearGradient id="head-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="head-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="head-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="head-slate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-light" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.05"/>
    </filter>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect x="15" y="15" width="1170" height="710" rx="36" fill="url(#bg)" filter="url(#shadow)"/>

  <text x="600" y="75" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="36" font-weight="900" fill="#1E293B">动态风险判定机制 (概念模型)</text>
  <text x="600" y="110" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="600" fill="#64748B">剥离具体数值，聚焦“基础评估-动态干预-分级输出”的核心研判逻辑</text>

  <g filter="url(#shadow)">
    <rect x="40" y="150" width="290" height="230" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="40" y="150" width="290" height="60" rx="20" fill="url(#head-blue)"/>
    <rect x="40" y="190" width="290" height="20" fill="url(#head-blue)"/>
    <text x="185" y="188" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">基础风险评估 (当前案件)</text>
    
    <text x="185" y="255" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1E293B">初始研判得分</text>
    <text x="185" y="290" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">引擎仅针对本次采集的</text>
    <text x="185" y="315" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">图文/多模态证据独立打分</text>
    
    <rect x="125" y="340" width="120" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="125" y="340" width="75" height="8" rx="4" fill="#3B82F6"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="40" y="410" width="290" height="260" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="40" y="410" width="290" height="60" rx="20" fill="url(#head-green)"/>
    <rect x="40" y="450" width="290" height="20" fill="url(#head-green)"/>
    <text x="185" y="448" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">前置经验干预 (相似命中)</text>
    
    <text x="185" y="515" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1E293B">动态奖惩调整</text>
    <text x="185" y="545" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">比对历史库与用户个人记忆</text>
    
    <rect x="60" y="565" width="250" height="80" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="85" cy="590" r="5" fill="#EF4444"/>
    <text x="105" y="596" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">命中高危：显著加分 (+)</text>
    <circle cx="85" cy="620" r="5" fill="#10B981"/>
    <text x="105" y="626" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">命中安全：适度减分 (-)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="150" width="360" height="520" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="360" y="150" width="360" height="60" rx="20" fill="url(#head-indigo)"/>
    <rect x="360" y="190" width="360" height="20" fill="url(#head-indigo)"/>
    <text x="540" y="188" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">核心引擎：动态阈值推导</text>

    <rect x="380" y="240" width="320" height="210" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="540" y="275" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="900" fill="#1E293B">动态拦截阈值映射曲线</text>
    
    <g transform="translate(410, 290)">
      <polyline points="0,130 0,10 0,130 260,130" fill="none" stroke="#94A3B8" stroke-width="2.5"/>
      <text x="-10" y="15" text-anchor="end" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#64748B">触发阈值 (要求)</text>
      <text x="260" y="150" text-anchor="end" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#64748B">历史风险极性</text>
      
      <path d="M 15 25 Q 120 25 240 110" fill="none" stroke="#4F46E5" stroke-width="5" stroke-linecap="round"/>
      <line x1="100" y1="45" x2="100" y2="130" stroke="#CBD5E1" stroke-dasharray="6 4" stroke-width="2"/>
      <line x1="0" y1="45" x2="100" y2="45" stroke="#CBD5E1" stroke-dasharray="6 4" stroke-width="2"/>
      <circle cx="100" cy="45" r="7" fill="#4F46E5"/>
      
      <rect x="115" y="30" width="145" height="30" rx="8" fill="#EEF2FF"/>
      <text x="187" y="51" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="900" fill="#4338CA">历史风险高 = 阈值低</text>
    </g>

    <rect x="380" y="480" width="320" height="95" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
    <text x="540" y="515" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="900" fill="#4338CA">综合得分 = 基础评估 + 干预调整</text>
    <line x1="410" y1="535" x2="670" y2="535" stroke="#DDD6FE" stroke-width="1.5"/>
    <text x="540" y="560" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">将综合得分与动态阈值进行越界比对</text>
    
    <path d="M 540 585 L 540 630" fill="none" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="750" y="150" width="410" height="520" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="750" y="150" width="410" height="60" rx="20" fill="url(#head-slate)"/>
    <rect x="750" y="190" width="410" height="20" fill="url(#head-slate)"/>
    <text x="955" y="188" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">最终风险定级输出</text>

    <rect x="770" y="235" width="370" height="110" rx="16" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5" filter="url(#shadow-light)"/>
    <circle cx="815" cy="290" r="24" fill="#DC2626"/>
    <text x="815" y="298" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">高</text>
    <text x="860" y="265" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" fill="#B91C1C">综合得分大幅超越动态阈值</text>
    <text x="860" y="295" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">逻辑：分值极高，且伴随高危命中</text>
    <text x="860" y="320" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="900" fill="#EF4444">→ 触发最高级拦截措施</text>

    <rect x="770" y="365" width="370" height="125" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5" filter="url(#shadow-light)"/>
    <circle cx="815" cy="427" r="24" fill="#EA580C"/>
    <text x="815" y="435" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">中</text>
    <text x="860" y="395" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" fill="#C2410C">得分跨越阈值 或 触发缓冲</text>
    <text x="860" y="425" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">逻辑 1：综合分正常超过当前阈值</text>
    <text x="860" y="450" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">逻辑 2：未超阈值，但命中典型特征</text>
    <text x="860" y="475" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="900" fill="#F97316">→ 触发强提醒与近阈值缓冲提升</text>

    <rect x="770" y="510" width="370" height="110" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow-light)"/>
    <circle cx="815" cy="565" r="24" fill="#64748B"/>
    <text x="815" y="573" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">低</text>
    <text x="860" y="540" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" fill="#334155">未触及阈值界限</text>
    <text x="860" y="570" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">逻辑：综合分在安全范围内</text>
    <text x="860" y="595" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="900" fill="#64748B">→ 保持静默守护，记录行为轨迹</text>
  </g>

  <path d="M 330 265 L 360 265" fill="none" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  
  <path d="M 330 540 L 345 540 L 345 525 L 360 525" fill="none" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  
  <path d="M 720 410 L 750 410" fill="none" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

</svg>
