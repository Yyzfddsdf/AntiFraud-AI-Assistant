<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="850" viewBox="0 0 1000 850">
  <defs>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
  </defs>

  <style type="text/css">
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .unit-container { fill: url(#grad-main); stroke: #E2E8F0; stroke-width: 2; rx: 24; ry: 24; }
    .header-bar { fill: #F1F5F9; stroke: #E2E8F0; stroke-width: 1.5; }
    .inner-block { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.2; rx: 16; ry: 16; }
    .module-title { font-family: "PingFang SC", sans-serif; font-size: 15px; font-weight: 800; fill: #1E293B; }
    .module-desc { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #64748B; }
    .flow-line { stroke: #6366F1; stroke-width: 8; fill: none; stroke-linecap: round; marker-end: url(#arrow-indigo); opacity: 0.15; }
    .data-pipe { fill: #CBD5E1; rx: 8; ry: 8; }
  </style>

  <rect width="1000" height="850" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">Agent编排架构图</text>

  <!-- Flow Arrows -->
  <line x1="500" y1="175" x2="500" y2="200" class="flow-line"/>
  <line x1="500" y1="680" x2="500" y2="720" class="flow-line"/>

  <!-- TOP DATA FEED -->
  <g transform="translate(100, 110)">
    <rect width="800" height="60" rx="30" ry="30" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="8 4"/>
    <text x="400" y="36" text-anchor="middle" class="module-title" fill="#1D4ED8" font-size="16">全量多模态原始数据流 (Multi-modal Data Feed)</text>
  </g>

  <!-- MAIN INTEGRATED UNIT -->
  <g transform="translate(100, 200)">
    <rect width="800" height="480" class="unit-container"/>
    <path d="M 0 24 Q 0 0 24 0 L 776 0 Q 800 0 800 24 L 800 50 L 0 50 Z" class="header-bar"/>
    <text x="400" y="32" text-anchor="middle" class="module-title" fill="#475569">核心级联推理矩阵 (Cascade Inference Matrix)</text>

    <!-- Sub-unit: Visual Modal Expert (Abstracted for Image/Video) -->
    <g transform="translate(40, 80)">
      <rect width="230" height="180" class="inner-block" stroke="#6366F1" stroke-width="2"/>
      <text x="115" y="35" text-anchor="middle" class="module-title" fill="#4338CA">视觉模态专家 Agent</text>
      <rect x="25" y="55" width="180" height="100" rx="8" fill="#EEF2FF"/>
      <text x="115" y="85" text-anchor="middle" class="module-desc" fill="#4338CA" font-weight="bold">（图像/视频流）</text>
      <text x="35" y="105" class="module-desc" fill="#4338CA">• 视频流动态场景分析</text>
      <text x="35" y="125" class="module-desc" fill="#4338CA">• 钓鱼页与证照伪造判定</text>
      <text x="35" y="145" class="module-desc" fill="#4338CA">• 异常交互行为视觉审计</text>
    </g>

    <!-- Sub-unit: Audio Modal Expert -->
    <g transform="translate(40, 280)">
      <rect width="230" height="160" class="inner-block" stroke="#10B981" stroke-width="2"/>
      <text x="115" y="35" text-anchor="middle" class="module-title" fill="#065F46">语音模态专家 Agent</text>
      <text x="115" y="65" text-anchor="middle" class="module-desc" fill="#059669" font-weight="bold">（音频/声纹）</text>
      <text x="30" y="90" class="module-desc">• 实时通话语音特征提取</text>
      <text x="30" y="115" class="module-desc">• 深度合成与特定话术检测</text>
      <text x="30" y="140" class="module-desc">• 异常语调与情绪风险预警</text>
    </g>

    <!-- CENTRAL MAIN BRAIN -->
    <g transform="translate(310, 80)">
      <rect width="455" height="360" rx="20" ry="20" fill="#F1F5F9" stroke="#1E293B" stroke-width="2.5"/>
      <text x="227.5" y="45" text-anchor="middle" class="module-title" font-size="18">反诈控制主智能体 (Orchestrator)</text>
      
      <g transform="translate(35, 90)">
        <rect width="385" height="230" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
        <text x="192.5" y="24" text-anchor="middle" class="module-title" font-size="13" fill="#4338CA">全生命周期推理逻辑域</text>
        <rect x="20" y="50" width="345" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
        <text x="40" y="75" class="module-desc" font-weight="800">1. 多维语义关系自动构建</text>
        <rect x="20" y="110" width="345" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
        <text x="40" y="135" class="module-desc" font-weight="800">2. 跨模态特征融合权重计算</text>
        <rect x="20" y="170" width="345" height="40" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
        <text x="40" y="195" class="module-desc" font-weight="800">3. 判研结论与响应指令输出</text>
      </g>
    </g>

    <rect x="270" y="160" width="40" height="20" class="data-pipe"/>
    <rect x="270" y="340" width="40" height="20" class="data-pipe"/>
  </g>

  <!-- BOTTOM OUTPUT UNIT -->
  <g transform="translate(250, 720)">
    <rect width="500" height="90" rx="45" ry="45" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3" filter="drop-shadow(0 8px 15px rgba(59,130,246,0.1))"/>
    <text x="250" y="42" text-anchor="middle" class="module-title" fill="#1E293B" font-size="18">全域分级判定结论 &amp; 联动指令输出</text>
    <text x="250" y="68" text-anchor="middle" class="module-desc" fill="#3B82F6" font-weight="900">MODAL-AWARE FEEDBACK LOOP</text>
  </g>

</svg>
