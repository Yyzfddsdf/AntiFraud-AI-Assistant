<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1000 880">
  <defs>
    <filter id="shadow-overall" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>

    <linearGradient id="grad-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>

    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="960" height="840" rx="30" ry="30" fill="#F8FAFC" filter="url(#shadow-overall)"/>

  <text x="500" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="44" font-weight="900" fill="#0F172A">反诈 Agent 多模态编排架构</text>

  <g transform="translate(100, 100)">
    <rect width="800" height="70" rx="35" ry="35" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3" stroke-dasharray="10 5"/>
    <text x="400" y="44" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" fill="#1D4ED8">全量多模态原始数据流 (Multi-modal Data Feed)</text>
  </g>

  <line x1="500" y1="170" x2="500" y2="200" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-blue)" opacity="0.6"/>

  <g transform="translate(100, 200)">
    <rect width="800" height="530" rx="24" ry="24" fill="url(#grad-main)" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M 0 24 Q 0 0 24 0 L 776 0 Q 800 0 800 24 L 800 55 L 0 55 Z" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="400" y="38" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="900" fill="#475569">核心级联推理矩阵 (Cascade Inference Matrix)</text>

    <g transform="translate(0, 0)">
      <line x1="400" y1="55" x2="400" y2="85" stroke="#3B82F6" stroke-width="4"/>
      <circle cx="400" cy="85" r="7" fill="#3B82F6"/>

      <path d="M 400 85 L 180 85 L 180 105" stroke="#6366F1" stroke-width="4" fill="none" marker-end="url(#arrow-indigo)"/>
      <rect x="220" y="72" width="100" height="28" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
      <text x="270" y="92" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#4338CA">图像/视频</text>

      <path d="M 400 85 L 620 85 L 620 105" stroke="#10B981" stroke-width="4" fill="none" marker-end="url(#arrow-green)"/>
      <rect x="480" y="72" width="100" height="28" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
      <text x="530" y="92" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#047857">语音/声纹</text>

      <path d="M 400 85 L 400 320" stroke="#F59E0B" stroke-width="4" stroke-dasharray="8 4" fill="none" marker-end="url(#arrow-amber)"/>
      <rect x="315" y="180" width="170" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
      <text x="400" y="204" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" fill="#D97706">文本指令直通汇总</text>
    </g>

    <g transform="translate(45, 115)">
      <rect width="270" height="185" rx="16" ry="16" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
      <text x="135" y="38" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#4338CA">视觉模态专家 Agent</text>
      <rect x="15" y="55" width="240" height="115" rx="10" fill="#EEF2FF"/>
      <text x="135" y="82" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#4338CA">（图像 / 视频分析）</text>
      <text x="30" y="112" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#4338CA">• 图像与视频内容识别</text>
      <text x="30" y="137" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#4338CA">• 仿冒页面与可疑元素判断</text>
      <text x="30" y="162" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#4338CA">• 输出视觉侧结构化线索</text>
    </g>

    <g transform="translate(485, 115)">
      <rect width="270" height="185" rx="16" ry="16" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      <text x="135" y="38" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#065F46">语音模态专家 Agent</text>
      <rect x="15" y="55" width="240" height="115" rx="10" fill="#ECFDF5"/>
      <text x="135" y="82" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#059669">（音频 / 语音分析）</text>
      <text x="30" y="112" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#059669">• 音频内容与语音特征提取</text>
      <text x="30" y="137" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#059669">• 可疑话术与仿冒语音判断</text>
      <text x="30" y="162" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#059669">• 输出音频侧结构化线索</text>
    </g>

    <g>
      <path d="M 180 300 L 180 335" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
      <rect x="115" y="300" width="130" height="30" rx="15" fill="#E2E8F0"/>
      <text x="180" y="321" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">提取结构化特征</text>

      <path d="M 620 300 L 620 335" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
      <rect x="555" y="300" width="130" height="30" rx="15" fill="#E2E8F0"/>
      <text x="620" y="321" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">提取结构化特征</text>
    </g>

    <g transform="translate(50, 345)">
      <rect width="700" height="165" rx="20" ry="20" fill="#F1F5F9" stroke="#1E293B" stroke-width="2.5"/>
      <text x="350" y="38" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="900" fill="#0F172A">反诈控制主智能体 (Orchestrator)</text>
      
      <rect x="25" y="55" width="650" height="95" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
      
      <rect x="35" y="62" width="630" height="25" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
      <text x="350" y="80" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#334155">1. 聚合多模态线索与文本指令进行全景逻辑推理</text>
      
      <rect x="35" y="90" width="630" height="25" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
      <text x="350" y="108" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#334155">2. 调用知识库检索与外部工具完成判定分析链路</text>

      <rect x="35" y="118" width="630" height="25" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
      <text x="350" y="136" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="800" fill="#334155">3. 生成最终报告并输出风险结果与联动指令</text>
    </g>
  </g>

  <line x1="500" y1="730" x2="500" y2="765" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-blue)" opacity="0.6"/>

  <g transform="translate(200, 770)">
    <rect width="600" height="85" rx="42.5" ry="42.5" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3" filter="url(#shadow-overall)"/>
    <text x="300" y="42" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="900" fill="#1E293B">全域分级判定结论 &amp; 联动指令输出</text>
    <text x="300" y="68" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" fill="#3B82F6">MODAL-AWARE FEEDBACK LOOP</text>
  </g>

</svg>
