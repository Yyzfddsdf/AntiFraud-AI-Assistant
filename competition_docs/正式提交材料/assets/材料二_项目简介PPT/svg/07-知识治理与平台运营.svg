<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1000 750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCFBF1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFEDD5;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect x="15" y="15" width="970" height="720" fill="url(#bg)" stroke="#E2E8F0" stroke-width="2" rx="30" filter="url(#shadow)"/>
  
  <text x="50" y="65" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="900" fill="#1E293B">治理主流程</text>

  <g transform="translate(45, 90)">
    <rect width="220" height="70" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" rx="35" filter="url(#shadow-sm)"/>
    <text x="110" y="32" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1D4ED8">典型案例送审</text>
    <text x="110" y="55" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#64748B">来自存量研判与用户</text>
  </g>

  <g transform="translate(285, 90)">
    <rect width="220" height="70" fill="#FFFFFF" stroke="#10B981" stroke-width="2" rx="35" filter="url(#shadow-sm)"/>
    <text x="110" y="32" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#047857">后台案件采集</text>
    <text x="110" y="55" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#64748B">公开案例与新型话术</text>
  </g>

  <path d="M 120 160 L 120 220" fill="none" stroke="#3B82F6" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <path d="M 395 160 L 395 185 L 120 185" fill="none" stroke="#10B981" stroke-width="4" stroke-linejoin="round"/>

  <g transform="translate(35, 230)">
    <rect width="170" height="160" fill="url(#blue)" stroke="#3B82F6" stroke-width="2" rx="20" filter="url(#shadow)"/>
    <text x="20" y="35" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" font-style="italic" fill="#1D4ED8">01</text>
    <text x="85" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1E293B">待审核案例池</text>
    <text x="85" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">统一接收待处理</text>
    <text x="85" y="140" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">保留来源与原材</text>
  </g>

  <g transform="translate(225, 230)">
    <rect width="170" height="160" fill="url(#green)" stroke="#10B981" stroke-width="2" rx="20" filter="url(#shadow)"/>
    <text x="20" y="35" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" font-style="italic" fill="#047857">02</text>
    <text x="85" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1E293B">管理员审核</text>
    <text x="85" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">确认真实与风险</text>
    <text x="85" y="140" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">筛除重复无效样本</text>
  </g>

  <g transform="translate(415, 230)">
    <rect width="170" height="160" fill="url(#teal)" stroke="#14B8A6" stroke-width="2" rx="20" filter="url(#shadow)"/>
    <text x="20" y="35" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" font-style="italic" fill="#0F766E">03</text>
    <text x="85" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1E293B">清洗标注</text>
    <text x="85" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">脱敏与字段规范</text>
    <text x="85" y="140" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">生成结构化特征</text>
  </g>

  <g transform="translate(605, 230)">
    <rect width="170" height="160" fill="url(#indigo)" stroke="#6366F1" stroke-width="2" rx="20" filter="url(#shadow)"/>
    <text x="20" y="35" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" font-style="italic" fill="#4338CA">04</text>
    <text x="85" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1E293B">正式知识库入库</text>
    <text x="85" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">案件索引与向量库</text>
    <text x="85" y="140" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">形成可检索底座</text>
  </g>

  <g transform="translate(795, 230)">
    <rect width="170" height="160" fill="url(#amber)" stroke="#F59E0B" stroke-width="2" rx="20" filter="url(#shadow)"/>
    <text x="20" y="35" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" font-style="italic" fill="#B45309">05</text>
    <text x="85" y="70" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="900" fill="#1E293B">检索复用与更新</text>
    <text x="85" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">为前台报告供能</text>
    <text x="85" y="140" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#475569">新型策略持续热更</text>
  </g>

  <path d="M 205 310 L 215 310" fill="none" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gray)"/>
  <path d="M 395 310 L 405 310" fill="none" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gray)"/>
  <path d="M 585 310 L 595 310" fill="none" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gray)"/>
  <path d="M 775 310 L 785 310" fill="none" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gray)"/>

  <g transform="translate(35, 435)">
    <rect width="540" height="195" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" rx="20" filter="url(#shadow-sm)"/>
    <text x="30" y="40" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" fill="#334155">治理运营支撑</text>
    
    <circle cx="35" cy="80" r="5" fill="#64748B"/>
    <text x="55" y="86" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#475569">审核链路全程可追溯，保证知识入库受控而非无序堆积</text>
    
    <circle cx="35" cy="125" r="5" fill="#64748B"/>
    <text x="55" y="131" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#475569">治理看板与风险地图支撑案例增量、类型分布和平台分析</text>
    
    <circle cx="35" cy="170" r="5" fill="#64748B"/>
    <text x="55" y="176" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#475569">管理员端承担复核、沉淀、回查和整体运营观察职责</text>
  </g>

  <g transform="translate(595, 435)">
    <rect width="370" height="195" fill="#F5F3FF" stroke="#C7D2FE" stroke-width="2" rx="20" filter="url(#shadow-sm)"/>
    <text x="30" y="40" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" fill="#4338CA">知识底座支撑</text>
    
    <circle cx="35" cy="80" r="5" fill="#6366F1"/>
    <text x="55" y="86" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#475569">正式知识库、向量库和图谱构成检索底座</text>
    
    <circle cx="35" cy="125" r="5" fill="#6366F1"/>
    <text x="55" y="131" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#475569">新案例入库后直接参与深度分析与热更新</text>
    
    <circle cx="35" cy="170" r="5" fill="#6366F1"/>
    <text x="55" y="176" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#475569">形成“治理反哺识别”的自动化知识闭环</text>
  </g>

  <path d="M 965 310 L 980 310 Q 985 310 985 320 L 985 680 Q 985 690 975 690 L 25 690 Q 15 690 15 680 L 15 320 Q 15 310 25 310 L 30 310" 
        fill="none" stroke="#059669" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round" marker-end="url(#arrow-dash)"/>
  
  <rect x="250" y="670" width="500" height="40" fill="#FFFFFF" stroke="#059669" stroke-width="1.5" rx="20" filter="url(#shadow-sm)"/>
  <text x="500" y="696" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="900" fill="#059669">新案例入库后持续反哺后续识别与知识更新</text>

</svg>
