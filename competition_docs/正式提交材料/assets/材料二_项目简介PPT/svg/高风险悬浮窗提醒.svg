<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="400" height="380" rx="20" fill="#F3F4F6" />
  
  <text x="25" y="25" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">11:16</text>
  <rect x="340" y="15" width="22" height="10" rx="3" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="342" y="17" width="14" height="6" rx="1" fill="#333"/>
  <path d="M333,20 a6,6 0 0,1 4,-4 m-2,8 a4,4 0 0,1 0,-6" fill="none" stroke="#333" stroke-width="1.5"/>

  <g transform="translate(0, 40)">
    <rect width="400" height="40" fill="#E5E7EB" />
    <text x="200" y="26" font-family="sans-serif" font-size="15" font-weight="bold" fill="#111" text-anchor="middle">客服 - 某某平台</text>
    <path d="M20,25 L30,17 L30,33 Z" fill="#666" />
    
    <text x="200" y="65" font-family="sans-serif" font-size="11" fill="#999" text-anchor="middle">11:15</text>

    <rect x="20" y="80" width="36" height="36" rx="4" fill="#D1D5DB" />
    <text x="38" y="103" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle">客</text>
    <path d="M66,95 L75,87 L75,103 Z" fill="#fff" />
    <rect x="70" y="80" width="280" height="40" rx="6" fill="#fff" />
    <text x="85" y="98" font-family="sans-serif" font-size="13" fill="#333">先生您好，您的账户存在异常风险，</text>
    <text x="85" y="114" font-family="sans-serif" font-size="13" fill="#333">请配合我们立即解除限制。</text>

    <rect x="344" y="135" width="36" height="36" rx="4" fill="#9CA3AF" />
    <text x="362" y="158" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle">我</text>
    <path d="M334,150 L325,142 L325,158 Z" fill="#A9EA7A" />
    <rect x="245" y="135" width="85" height="36" rx="6" fill="#A9EA7A" />
    <text x="260" y="158" font-family="sans-serif" font-size="13" fill="#333">怎么解除？</text>

    <rect x="20" y="185" width="36" height="36" rx="4" fill="#D1D5DB" />
    <text x="38" y="208" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle">客</text>
    <path d="M66,200 L75,192 L75,208 Z" fill="#fff" />
    <rect x="70" y="185" width="285" height="60" rx="6" fill="#fff" />
    <text x="85" y="203" font-family="sans-serif" font-size="13" fill="#333">请点击下方官方链接填写信息验证，</text>
    <text x="85" y="219" font-family="sans-serif" font-size="13" fill="#333">否则后果需要您本人承担！</text>
    <text x="85" y="235" font-family="sans-serif" font-size="12" fill="#3B82F6" text-decoration="underline">http://security-verify-center.com</text>
  </g>

  <rect width="400" height="380" fill="rgba(255,255,255,0.4)" rx="20"/>

  <g transform="translate(15, 35)" filter="url(#shadow)">
    <rect width="370" height="175" rx="14" fill="#DA2F2F" />
    
    <circle cx="45" cy="55" r="18" fill="#fff" />
    <path d="M45,43 L45,58" stroke="#DA2F2F" stroke-width="4" stroke-linecap="round" />
    <circle cx="45" cy="65" r="2.5" fill="#DA2F2F" />

    <text x="80" y="35" font-family="sans-serif" font-size="12" fill="#FFE5E5">后台检测提醒</text>
    <text x="80" y="55" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">当前疑似存在高风险因素，请进入软件</text>
    <text x="80" y="75" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">进行深度分析</text>

    <rect x="295" y="85" width="60" height="22" rx="11" fill="#ffffff" />
    <text x="325" y="101" font-family="sans-serif" font-size="12" font-weight="bold" fill="#DA2F2F" text-anchor="middle">高风险</text>

    <foreignObject x="80" y="90" width="210" height="80">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: sans-serif; font-size: 11px; color: #ffffff; line-height: 1.5; text-align: justify;">
        图片显示一条冒充“某某平台客服”的伪造通知，内容声称“账户存在异常风险”，并使用“否则后果需要您本人承担”等恐吓性语言，属于典型的伪造官方通知和诱导处理的高风险诈骗信号。
      </div>
    </foreignObject>

    <text x="35" y="155" font-family="sans-serif" font-size="12" fill="#FFE5E5">点击查看详情</text>
  </g>

  <g transform="translate(290, 220)">
    <circle cx="20" cy="15" r="12" fill="none" stroke="#666" stroke-width="1.5" />
    <text x="20" y="19" font-family="serif" font-size="14" fill="#666" text-anchor="middle" font-weight="bold">i</text>
    
    <path d="M50,15 m-7,-2 l2,-2 l4,0 l2,2 l0,4 l-2,2 l-4,0 l-2,-2 z" fill="none" stroke="#666" stroke-width="1.5" />
    <circle cx="50" cy="15" r="3" fill="none" stroke="#666" stroke-width="1.5" />
  </g>

  <rect x="130" y="365" width="140" height="4" rx="2" fill="#333" />
</svg>
