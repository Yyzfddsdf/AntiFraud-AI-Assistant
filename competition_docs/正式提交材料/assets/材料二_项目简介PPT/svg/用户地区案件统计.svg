  <rect x="810" y="370" width="75" height="20" rx="2" fill="#1E293B" />
  <text x="847" y="384" font-family="sans-serif" font-size="10" fill="#CBD5E1" text-anchor="middle">冒充客服类 - 1</text>
  
  <rect x="915" y="345" width="40" height="18" rx="2" fill="#4C1D95" opacity="0.6"/>
