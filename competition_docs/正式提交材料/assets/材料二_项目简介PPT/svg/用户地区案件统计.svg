  <text x="860" y="190" font-family="sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC">22</text>

  <rect x="700" y="220" width="280" height="350" fill="url(#panelBg)" stroke="#1E293B" stroke-width="1" />
  <text x="715" y="250" font-family="sans-serif" font-size="12" fill="#94A3B8">河北省城市案件排行</text>
  
  <rect x="715" y="265" width="250" height="32" rx="4" fill="#0F172A" />
  <circle cx="730" cy="281" r="5" fill="none" stroke="#64748B" stroke-width="1.5" />
  <path d="M734,285 L738,289" stroke="#64748B" stroke-width="1.5" />
