  <text x="955" y="375" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="end">下降: -71.4%</text>
  
  <rect x="905" y="380" width="50" height="16" rx="2" fill="#0369A1" />
  <text x="930" y="391" font-family="sans-serif" font-size="10" fill="#E0F2FE" text-anchor="middle">查看摘要</text>
