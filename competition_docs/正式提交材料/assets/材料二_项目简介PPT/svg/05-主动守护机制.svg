<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800">
  <defs>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-lg" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
    
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <linearGradient id="phone-screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <linearGradient id="glass-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6" />
    </linearGradient>
    <linearGradient id="line-flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <marker id="arrow-flow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-danger" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#EF4444"/>
    </marker>
  </defs>

  <style>
    .text-title { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 40px; font-weight: 800; fill: #0F172A; }
    .text-sub { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 15px; fill: #64748B; letter-spacing: 1px; }
    .text-ui { font-family: "PingFang SC", sans-serif; font-size: 12px; fill: #475569; }
    .text-card-title { font-family: "PingFang SC", sans-serif; font-size: 15px; font-weight: 800; fill: #1E293B; }
    .text-card-desc { font-family: "PingFang SC", sans-serif; font-size: 12px; fill: #64748B; }
  </style>

  <g transform="translate(60, 140)">
    <rect width="240" height="260" rx="24" fill="#FFFFFF" filter="url(#shadow-md)" />
    
    <rect width="240" height="50" rx="24" fill="#F8FAFC"/>
    <rect y="30" width="240" height="20" fill="#F8FAFC"/>
    <circle cx="120" cy="25" r="14" fill="#10B981" fill-opacity="0.1"/>
    <circle cx="120" cy="25" r="6" fill="#10B981"/>
    <text x="120" y="65" text-anchor="middle" class="text-card-title">当前活动应用 (WeChat)</text>

    <g transform="translate(15, 90)">
      <circle cx="15" cy="15" r="12" fill="#CBD5E1"/>
      <rect x="35" y="0" width="160" height="40" rx="12" fill="#F1F5F9"/>
      <text x="45" y="16" class="text-ui">你好，由于您的账户异常</text>
      <text x="45" y="32" class="text-ui">需要进行<tspan fill="#EF4444" font-weight="bold">资金核验转账</tspan></text>
      
      <circle cx="15" cy="70" r="12" fill="#CBD5E1"/>
      <rect x="35" y="55" width="175" height="40" rx="12" fill="#FFF1F2" stroke="#FECDD3"/>
      <text x="45" y="71" class="text-ui">请点击以下链接处理：</text>
      <text x="45" y="87" class="text-ui" fill="#2563EB" text-decoration="underline">http://safe-verify.com/pay</text>
      
      <rect x="95" y="110" width="100" height="30" rx="12" fill="#DCF8C6"/>
      <text x="105" y="130" class="text-ui">好的，我马上转</text>
    </g>
    
    <rect x="-10" y="-10" width="260" height="280" rx="30" fill="none" stroke="#94A3B8" stroke-dasharray="8 6" stroke-width="2"/>
    <rect x="75" y="-22" width="90" height="24" rx="12" fill="#F1F5F9" stroke="#CBD5E1"/>
    <text x="120" y="-6" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="bold" fill="#64748B">UI 视图树更新</text>
  </g>


  <g transform="translate(380, 20)">
    
    <rect x="10" y="10" width="340" height="660" rx="46" fill="black" opacity="0.1" filter="url(#shadow-lg)"/>
    <rect width="360" height="660" rx="46" fill="#1E293B"/>
    <rect x="-4" y="160" width="4" height="45" rx="2" fill="#334155"/>
    <rect x="-4" y="220" width="4" height="45" rx="2" fill="#334155"/>
    <rect x="360" y="200" width="4" height="60" rx="2" fill="#334155"/>
    
    <rect x="12" y="12" width="336" height="636" rx="36" fill="url(#phone-screen)"/>
    <path d="M 12 50 Q 180 -10 348 50 L 348 100 Q 180 40 12 100 Z" fill="#FFFFFF" opacity="0.4" />

    <rect x="130" y="25" width="100" height="24" rx="12" fill="#0F172A"/> <text x="40" y="42" font-family="sans-serif" font-weight="bold" font-size="13" fill="#1E293B">14:30</text>
    <g transform="translate(280, 32)" fill="#1E293B">
      <rect x="0" y="6" width="3" height="4" rx="1"/>
      <rect x="4" y="4" width="3" height="6" rx="1"/>
      <rect x="8" y="2" width="3" height="8" rx="1"/>
      <rect x="12" y="0" width="3" height="10" rx="1"/>
      <rect x="22" y="0" width="18" height="10" rx="3" fill="none" stroke="#1E293B" stroke-width="1.5"/>
      <rect x="24" y="2" width="10" height="6" rx="1"/>
    </g>

    <text x="180" y="90" text-anchor="middle" class="text-ui" font-weight="bold" fill="#64748B">反诈卫士 · 系统底层进程 (Background)</text>

    <g transform="translate(28, 120)">
      <rect width="304" height="90" rx="20" fill="url(#glass-card)" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <circle cx="26" cy="45" r="16" fill="#DBEAFE"/>
      <path d="M21 45 C21 42 31 42 31 45 C31 48 21 48 21 45 Z" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <circle cx="26" cy="45" r="3" fill="#3B82F6"/>
      <text x="56" y="40" class="text-card-title">Accessibility 无障碍侦测层</text>
      <text x="56" y="62" class="text-card-desc">全域监听 UI Event，静默捕获节点文本</text>
      <circle cx="280" cy="45" r="4" fill="#10B981"/>
    </g>

    <line x1="180" y1="210" x2="180" y2="235" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4"/>

    <g transform="translate(28, 235)">
      <rect width="304" height="90" rx="20" fill="url(#glass-card)" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <circle cx="26" cy="45" r="16" fill="#E0E7FF"/>
      <rect x="18" y="38" width="16" height="14" rx="2" fill="none" stroke="#6366F1" stroke-width="2"/>
      <line x1="18" y1="45" x2="34" y2="45" stroke="#6366F1" stroke-width="1.5"/>
      <text x="56" y="40" class="text-card-title">Local 端侧轻量级 OCR</text>
      <text x="56" y="62" class="text-card-desc">当 UI 树受限时，触发毫秒级截屏推演</text>
      <circle cx="280" cy="45" r="4" fill="#10B981"/>
    </g>

    <line x1="180" y1="325" x2="180" y2="350" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4"/>

    <g transform="translate(28, 350)">
      <rect width="304" height="110" rx="20" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="2" filter="url(#shadow-md)"/>
      <circle cx="26" cy="35" r="16" fill="#FEE2E2"/>
      <path d="M26 23 L18 39 L34 39 Z" fill="none" stroke="#EF4444" stroke-width="2"/>
      <line x1="26" y1="29" x2="26" y2="33" stroke="#EF4444" stroke-width="2"/>
      <circle cx="26" cy="36" r="1" fill="#EF4444"/>
      
      <text x="56" y="40" class="text-card-title" fill="#9F1239">多模态分级研判决策大脑</text>
      <rect x="56" y="55" width="220" height="36" rx="8" fill="#FFFFFF"/>
      <text x="66" y="77" font-size="13" font-family="sans-serif" font-weight="bold" fill="#B91C1C">状态：命中 [ 诈骗话术 ] - 风险等级 5</text>
    </g>

    <g transform="translate(330, 480)">
      <circle cx="0" cy="0" r="35" fill="#EF4444" opacity="0.2">
        <animate attributeName="r" values="30;45;30" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="0" cy="0" r="28" fill="#EF4444" filter="url(#shadow-md)"/>
      <circle cx="0" cy="0" r="22" fill="#DC2626"/>
      <path d="M-8 -6 L0 -10 L8 -6 L8 2 C8 8 0 12 0 12 C0 12 -8 8 -8 2 Z" fill="#FFFFFF"/>
      <path d="M -28 0 L -80 0" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3 3"/>
      <text x="-90" y="4" text-anchor="end" font-size="11" font-weight="bold" fill="#EF4444">变温悬浮球预警</text>
    </g>
  </g>

  <path d="M 310 390 Q 360 390 380 320 T 405 240" fill="none" stroke="url(#line-flow)" stroke-width="3" marker-end="url(#arrow-flow)"/>
  
  <rect x="325" y="275" width="46" height="22" rx="11" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="348" y="290" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">抓取</text>


  <g transform="translate(760, 420)">
    <circle cx="130" cy="130" r="140" fill="#FEF2F2" filter="url(#glow-red)" opacity="0.6"/>
    
    <rect width="260" height="260" rx="24" fill="#FFFFFF" filter="url(#shadow-lg)"/>
    
    <path d="M 0 24 Q 0 0 24 0 L 236 0 Q 260 0 260 24 L 260 80 L 0 80 Z" fill="#EF4444"/>
    <circle cx="130" cy="40" r="20" fill="#FFFFFF" opacity="0.2"/>
    <path d="M 130 25 L 115 52 L 145 52 Z" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="130" y1="35" x2="130" y2="43" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="130" cy="48" r="1.5" fill="#FFFFFF"/>
    
    <text x="130" y="115" text-anchor="middle" font-size="18" font-family="PingFang SC" font-weight="800" fill="#1E293B">⚠️ 高危风险拦截</text>
    
    <rect x="20" y="130" width="220" height="60" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="35" y="152" font-size="12" font-family="sans-serif" fill="#64748B">检测到应用中包含：</text>
    <text x="35" y="172" font-size="13" font-family="sans-serif" font-weight="bold" fill="#B91C1C">典型的“资金核验转账”骗局</text>
    
    <rect x="20" y="205" width="135" height="40" rx="20" fill="#3B82F6"/>
    <text x="87" y="230" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#FFFFFF">终止并返回安全</text>
    
    <rect x="165" y="205" width="75" height="40" rx="20" fill="#F1F5F9"/>
    <text x="202" y="230" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#64748B">无视风险</text>
  </g>

  <path d="M 640 500 Q 700 500 750 550" fill="none" stroke="#EF4444" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-danger)"/>
  
  <rect x="650" y="490" width="84" height="26" rx="13" fill="#FEF2F2" stroke="#FECDD3"/>
  <text x="692" y="508" text-anchor="middle" font-size="12" fill="#E11D48" font-weight="bold">阻断与强提醒</text>

</svg>
