<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.05"/>
    </filter>
    <filter id="layerShadow" x="-1%" y="-1%" width="102%" height="102%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.03"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <style>
    .main-title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #0F172A; }
    .main-subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 400; fill: #64748B; }
    .layer-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #475569; }
    .card-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 600; fill: #1E293B; }
    .card-subtext { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #64748B; }
    .line { stroke: #94A3B8; stroke-width: 1.5; fill: none; stroke-linejoin: round; }
    .line-active { stroke: #3B82F6; stroke-width: 1.5; fill: none; stroke-dasharray: 3; stroke-linejoin: round; }
  </style>

