<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#EFF6FF" />
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>

    <!-- Header Gradient -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    
    <linearGradient id="headerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Layer Backgrounds -->
    <linearGradient id="layerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F1F5F9" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 700; fill: #1E293B; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 500; fill: #64748B; }
    .layer-title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 600; fill: #334155; }
    .card-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #1E293B; }
    .card-subtext { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 400; fill: #64748B; }
    .header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #FFFFFF; }
    .line { stroke: #CBD5E1; stroke-width: 2; fill: none; }
    .line-active { stroke: #3B82F6; stroke-width: 2; fill: none; stroke-dasharray: 4; }
  </style>

  <!-- Background -->
  <rect width="1000" height="850" fill="url(#bgGrad)"/>
  
  <!-- Main Title -->
  <text x="500" y="50" text-anchor="middle" class="title">反诈卫士 (Sensible AI) - 系统总体架构</text>
  <text x="500" y="80" text-anchor="middle" class="subtitle">展示用户交互层、业务服务层与数据缓存层的核心联动关系</text>

  <!-- LAYER 1: USER INTERACTION -->
  <rect x="50" y="120" width="900" height="150" rx="16" fill="url(#layerBg)" filter="url(#shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="50" y="120" width="160" height="40" rx="8" fill="url(#headerGrad)"/>
  <text x="130" y="145" text-anchor="middle" class="header-text">1. 用户交互层</text>

  <!-- Cards in Layer 1 -->
  <!-- Admin Web -->
  <rect x="150" y="180" width="200" height="60" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="250" y="205" text-anchor="middle" class="card-text">管理员端 (Web)</text>
  <text x="250" y="225" text-anchor="middle" class="card-subtext">Vue 3 / 案件与知识图谱</text>

  <!-- Mobile Web -->
  <rect x="400" y="180" width="200" height="60" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="500" y="205" text-anchor="middle" class="card-text">移动端 (Mobile Web)</text>
  <text x="500" y="225" text-anchor="middle" class="card-subtext">分析查询 / 聊天 / 模拟</text>

  <!-- Android Native -->
  <rect x="650" y="180" width="200" height="60" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="750" y="205" text-anchor="middle" class="card-text">Android 原生端</text>
  <text x="750" y="225" text-anchor="middle" class="card-subtext">无障碍守护 / 悬浮快判 / 通知</text>

  <!-- LAYER 2: BUSINESS SERVICES -->
  <rect x="50" y="320" width="900" height="260" rx="16" fill="url(#layerBg)" filter="url(#shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="50" y="320" width="160" height="40" rx="8" fill="url(#headerGrad)"/>
  <text x="130" y="345" text-anchor="middle" class="header-text">2. 业务服务层</text>

  <!-- Flow Lines from Layer 1 to Layer 2 -->
  <path d="M 250 240 L 250 320" class="line" marker-end="url(#arrow)"/>
  <path d="M 500 240 L 500 320" class="line" marker-end="url(#arrow)"/>
  <path d="M 750 240 L 750 320" class="line" marker-end="url(#arrow)"/>

  <!-- Cards in Layer 2 -->
  <!-- Auth & Region -->
  <rect x="100" y="380" width="180" height="70" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="120" cy="415" r="4" fill="#3B82F6"/>
  <text x="135" y="410" class="card-text">认证与用户服务</text>
  <text x="135" y="430" class="card-subtext">JWT签发 / 画像 / 地区</text>

  <!-- Multimodal Task -->
  <rect x="300" y="380" width="180" height="70" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="320" cy="415" r="4" fill="#8B5CF6"/>
  <text x="335" y="410" class="card-text">多模态任务编排</text>
  <text x="335" y="430" class="card-subtext">子智能体取证并发流转</text>

  <!-- RAG Agent -->
  <rect x="500" y="380" width="180" height="70" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="520" cy="415" r="4" fill="#10B981"/>
  <text x="535" y="410" class="card-text">主智能体 RAG 引擎</text>
  <text x="535" y="430" class="card-subtext">全局案例 + 个人记忆召回</text>

  <!-- Knowledge & History -->
  <rect x="700" y="380" width="180" height="70" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="720" cy="415" r="4" fill="#F59E0B"/>
  <text x="735" y="410" class="card-text">知识库与历史服务</text>
  <text x="735" y="430" class="card-subtext">向量索引 / 案例沉淀</text>

  <!-- Chat & Sim -->
  <rect x="150" y="480" width="180" height="70" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="170" cy="515" r="4" fill="#EC4899"/>
  <text x="185" y="510" class="card-text">AI 助手与模拟层</text>
  <text x="185" y="530" class="card-subtext">多轮对话 / 答题评级</text>

  <!-- Family & Notification -->
  <rect x="360" y="480" width="180" height="70" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="380" cy="515" r="4" fill="#06B6D4"/>
  <text x="395" y="510" class="card-text">家庭联动与预警</text>
  <text x="395" y="530" class="card-subtext">守护归档推送 (WS)</text>

  <!-- Admin Review & Stats -->
  <rect x="570" y="480" width="180" height="70" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <circle cx="590" cy="515" r="4" fill="#6366F1"/>
  <text x="605" y="510" class="card-text">审核与态势分析</text>
  <text x="605" y="530" class="card-subtext">地图热点 / 图谱聚合</text>

  <!-- Connection internal Layer 2 -->
  <path d="M 480 415 L 500 415" class="line" marker-end="url(#arrow)"/>
  <path d="M 680 415 L 700 415" class="line" marker-end="url(#arrow)"/>

  <!-- LAYER 3: DATA AND CACHE -->
  <rect x="50" y="630" width="900" height="170" rx="16" fill="url(#layerBg)" filter="url(#shadow)" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="50" y="630" width="160" height="40" rx="8" fill="url(#headerGrad2)"/>
  <text x="130" y="655" text-anchor="middle" class="header-text">3. 数据与缓存层</text>

  <!-- Flow Lines from Layer 2 to Layer 3 -->
  <path d="M 300 580 L 300 630" class="line" marker-end="url(#arrow)"/>
  <path d="M 500 580 L 500 630" class="line" marker-end="url(#arrow)"/>
  <path d="M 700 580 L 700 630" class="line" marker-end="url(#arrow)"/>

  <!-- Main SQLite DB -->
  <rect x="120" y="690" width="180" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <path d="M 140 710 Q 140 705 160 705 T 180 710 Q 180 715 160 715 T 140 710 Z" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <path d="M 140 710 L 140 730 M 180 710 L 180 730" stroke="#3B82F6" stroke-width="2"/>
  <path d="M 140 730 Q 140 735 160 735 T 180 730" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <text x="195" y="725" class="card-text">主业务数据库</text>
  <text x="195" y="745" class="card-subtext">用户/任务/归档/家庭</text>

  <!-- Knowledge SQLite DB -->
  <rect x="330" y="690" width="180" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <path d="M 350 710 Q 350 705 370 705 T 390 710 Q 390 715 370 715 T 350 710 Z" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <path d="M 350 710 L 350 730 M 390 710 L 390 730" stroke="#8B5CF6" stroke-width="2"/>
  <path d="M 350 730 Q 350 735 370 735 T 390 730" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <text x="405" y="725" class="card-text">案例知识库</text>
  <text x="405" y="745" class="card-subtext">待审表/历史沉淀库</text>

  <!-- Redis Cache -->
  <rect x="540" y="690" width="180" height="80" rx="8" fill="#FFE4E6" filter="url(#cardShadow)"/>
  <text x="630" y="725" text-anchor="middle" class="card-text">Redis 缓存层</text>
  <text x="630" y="745" text-anchor="middle" class="card-subtext">验证码/会话/限流/向量缓冲</text>

  <!-- External Models -->
  <rect x="750" y="690" width="180" height="80" rx="8" fill="#ECFCCB" filter="url(#cardShadow)"/>
  <text x="840" y="725" text-anchor="middle" class="card-text">外部 AI 模型服务</text>
  <text x="840" y="745" text-anchor="middle" class="card-subtext">向量检索 / LLM / Tavily</text>

  <!-- Global API Links -->
  <path d="M 840 580 L 840 690" class="line-active" marker-end="url(#arrow-blue)"/>
  <text x="850" y="620" class="card-subtext" fill="#3B82F6">API 通信</text>

</svg>
