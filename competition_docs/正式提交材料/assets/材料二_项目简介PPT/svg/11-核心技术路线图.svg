    <text x="205" y="650" text-anchor="middle" font-size="18" font-family="'Microsoft YaHei', sans-serif" fill="#475569">解决痛点：</text>
    <text x="205" y="680" text-anchor="middle" font-size="18" font-family="'Microsoft YaHei', sans-serif" fill="#475569">“怎么看懂复杂证据”</text>

    <rect x="370" y="520" width="280" height="180" rx="16" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1.5"/>
    <text x="510" y="575" text-anchor="middle" font-size="24" font-weight="bold" font-family="'Microsoft YaHei', sans-serif" fill="#0F766E">约束与支撑</text>
    <circle cx="510" cy="610" r="5" fill="#2DD4BF"/>
    <text x="510" y="650" text-anchor="middle" font-size="18" font-family="'Microsoft YaHei', sans-serif" fill="#475569">解决痛点：</text>
    <text x="510" y="680" text-anchor="middle" font-size="18" font-family="'Microsoft YaHei', sans-serif" fill="#475569">“如何让判断稳定且有据”</text>

    <rect x="675" y="520" width="280" height="180" rx="16" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="815" y="575" text-anchor="middle" font-size="24" font-weight="bold" font-family="'Microsoft YaHei', sans-serif" fill="#EA580C">实时联动</text>
    <circle cx="815" cy="610" r="5" fill="#FB923C"/>
    <text x="815" y="650" text-anchor="middle" font-size="18" font-family="'Microsoft YaHei', sans-serif" fill="#475569">解决痛点：</text>
    <text x="815" y="680" text-anchor="middle" font-size="18" font-family="'Microsoft YaHei', sans-serif" fill="#475569">“从识别走向联防与服务”</text>
