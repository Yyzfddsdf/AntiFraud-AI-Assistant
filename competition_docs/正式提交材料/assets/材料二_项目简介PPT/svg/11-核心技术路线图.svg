<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="head1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="head2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="head3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="head4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1E293B; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #64748B; }
      .head { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #FFFFFF; }
      .cardTitle { font: 700 20px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1E293B; }
      .cardText { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .summary { font: 600 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1E293B; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" class="title">核心技术路线图</text>
  <text x="600" y="76" text-anchor="middle" class="subtitle">突出多模态分析、知识支撑和实时联动如何构建完整反诈服务链路</text>

  <g filter="url(#shadow)">
    <rect x="70" y="120" width="250" height="230" rx="20" fill="#FFFFFF"/>
    <rect x="70" y="120" width="250" height="58" rx="20" fill="url(#head1)"/>
    <rect x="70" y="160" width="250" height="18" fill="url(#head1)"/>
    <text x="195" y="156" text-anchor="middle" class="head">多模态分析</text>
    <text x="195" y="215" text-anchor="middle" class="cardTitle">复杂证据输入</text>
    <text x="195" y="248" text-anchor="middle" class="cardText">文本、图片、音频、视频</text>
    <text x="195" y="278" text-anchor="middle" class="cardText">统一进入分析链路</text>
    <text x="195" y="308" text-anchor="middle" class="cardText">提取结构化风险线索</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="120" width="250" height="230" rx="20" fill="#FFFFFF"/>
    <rect x="350" y="120" width="250" height="58" rx="20" fill="url(#head2)"/>
    <rect x="350" y="160" width="250" height="18" fill="url(#head2)"/>
    <text x="475" y="156" text-anchor="middle" class="head">知识支撑</text>
    <text x="475" y="215" text-anchor="middle" class="cardTitle">双重参考依据</text>
    <text x="475" y="248" text-anchor="middle" class="cardText">历史案件知识库</text>
    <text x="475" y="278" text-anchor="middle" class="cardText">用户个人历史记忆</text>
    <text x="475" y="308" text-anchor="middle" class="cardText">提高判断可靠性</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="630" y="120" width="250" height="230" rx="20" fill="#FFFFFF"/>
    <rect x="630" y="120" width="250" height="58" rx="20" fill="url(#head3)"/>
    <rect x="630" y="160" width="250" height="18" fill="url(#head3)"/>
    <text x="755" y="156" text-anchor="middle" class="head">风险判断</text>
    <text x="755" y="215" text-anchor="middle" class="cardTitle">动态评估与分级</text>
    <text x="755" y="248" text-anchor="middle" class="cardText">综合当前案件评估</text>
    <text x="755" y="278" text-anchor="middle" class="cardText">结合知识支撑动态调整</text>
    <text x="755" y="308" text-anchor="middle" class="cardText">输出结构化风险结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="910" y="120" width="220" height="230" rx="20" fill="#FFFFFF"/>
    <rect x="910" y="120" width="220" height="58" rx="20" fill="url(#head4)"/>
    <rect x="910" y="160" width="220" height="18" fill="url(#head4)"/>
    <text x="1020" y="156" text-anchor="middle" class="head">实时联动</text>
    <text x="1020" y="215" text-anchor="middle" class="cardTitle">提醒与治理闭环</text>
    <text x="1020" y="248" text-anchor="middle" class="cardText">主动提醒</text>
    <text x="1020" y="278" text-anchor="middle" class="cardText">家庭联防</text>
    <text x="1020" y="308" text-anchor="middle" class="cardText">治理沉淀与持续优化</text>
  </g>

  <rect x="110" y="430" width="980" height="190" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="475" text-anchor="middle" class="summary">技术路线主线</text>
  <text x="600" y="515" text-anchor="middle" class="cardText">多模态分析解决“怎么看懂复杂证据”</text>
  <text x="600" y="545" text-anchor="middle" class="cardText">知识支撑解决“如何让判断更有依据”</text>
  <text x="600" y="575" text-anchor="middle" class="cardText">实时联动解决“如何从识别走向提醒、联防与持续服务”</text>

  <rect x="250" y="650" width="700" height="58" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.2"/>
  <text x="600" y="685" text-anchor="middle" class="subtitle">该图用于技术路线页，强调关键能力路径，不与第 7 页工程架构图重复</text>
</svg>
