<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="650" viewBox="0 0 1000 650">
  <defs>
    <linearGradient id="grad-rose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF1F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4E6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F43F5E"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
  </defs>

  <style type="text/css">
    .bg { fill: #F8FAFC; }
    .title { font-family: "PingFang SC", sans-serif; font-size: 26px; font-weight: 800; fill: #0F172A; }
    .subtitle { font-family: "PingFang SC", sans-serif; font-size: 14px; fill: #64748B; }
    .node-title { font-family: "PingFang SC", sans-serif; font-size: 14px; font-weight: 800; fill: #1E293B; }
    .node-desc { font-family: "PingFang SC", sans-serif; font-size: 11px; fill: #475569; }
    .phone-box { fill: #FFFFFF; stroke-width: 1.5; rx: 20; ry: 20; }
    .cloud-main { fill: #FFFFFF; stroke: #6366F1; stroke-width: 4; filter: drop-shadow(0 8px 16px rgba(99, 102, 241, 0.15)); }
    .sync-line { stroke-width: 4; fill: none; stroke-linecap: round; }
  </style>

  <rect width="1000" height="650" class="bg"/>
  <text x="500" y="55" text-anchor="middle" class="title">“核心判定触发，家庭全量联动”架构图</text>

  <!-- CLOUD BRAIN (CENTERED AT 500, 325) -->
  <g transform="translate(500, 325)">
    <!-- Explicit Cloud Path optimized for Center -->
    <path class="cloud-main" d="M 40 -35 
      C 40 -50 25 -65 0 -65 
      C -10 -65 -20 -60 -25 -55 
      C -35 -65 -55 -65 -65 -50 
      C -85 -50 -100 -35 -100 -10 
      C -100 15 -85 35 -65 35 
      L 50 35 
      C 75 35 90 15 90 -10 
      C 90 -35 75 -50 50 -50 
      C 48 -50 45 -50 40 -48 Z" />
    <text y="-5" text-anchor="middle" class="node-title" fill="#4338CA" font-size="20">反诈云端智脑</text>
    <text y="20" text-anchor="middle" class="node-desc" fill="#6366F1" font-weight="900">CLOUD BRAIN HUB</text>
    
    <!-- AI Inside Box below cloud -->
    <rect x="-100" y="55" width="200" height="75" rx="12" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text y="82" text-anchor="middle" class="node-title" fill="#4338CA" font-size="12">多智能体协同判研</text>
    <text y="105" text-anchor="middle" class="node-desc" fill="#6366F1">跨场景特征匹配与知识召回</text>
  </g>

  <!-- LEFT: Protected Terminal (100, 150) -->
  <g transform="translate(100, 150)">
    <rect width="250" height="420" class="phone-box" stroke="#FDA4AF"/>
    <path d="M 0 16 Q 0 0 16 0 L 234 0 Q 250 0 250 16 L 250 35 L 0 35 Z" fill="url(#grad-rose)" stroke="#F43F5E"/>
    <text x="125" y="22" text-anchor="middle" class="node-title" fill="#BE123C" font-size="12">被守护者 (Device A)</text>
    
    <g transform="translate(20, 65)">
        <rect width="210" height="120" rx="12" fill="#FFFFFF" stroke="#F43F5E" stroke-opacity="0.3"/>
        <text x="105" y="30" text-anchor="middle" class="node-title" fill="#BE123C" font-size="13">风险触发与识别</text>
        <text x="10" y="65" class="node-desc">• 敏感内容实时捕获</text>
        <text x="10" y="88" class="node-desc">• 本地分级研判流水生成</text>
        <text x="105" y="112" text-anchor="middle" class="node-title" fill="#BE123C" font-size="11">! 命中黑样本特征 !</text>
    </g>

    <g transform="translate(20, 260)">
        <rect width="210" height="110" rx="12" fill="#FFFFFF" stroke="#3B82F6" stroke-dasharray="6 3"/>
        <text x="105" y="32" text-anchor="middle" class="node-title" fill="#1D4ED8" font-size="13">端侧强力拦截</text>
        <text x="10" y="65" class="node-desc">• 强交互防御弹窗</text>
        <text x="10" y="88" class="node-desc">• 物理隔离保护模式</text>
    </g>
  </g>

  <!-- RIGHT: Guardian Terminal (650, 150) -->
  <g transform="translate(650, 150)">
    <rect width="250" height="420" class="phone-box" stroke="#6EE7B7"/>
    <path d="M 0 16 Q 0 0 16 0 L 234 0 Q 250 0 250 16 L 250 35 L 0 35 Z" fill="url(#grad-emerald)" stroke="#10B981"/>
    <text x="125" y="22" text-anchor="middle" class="node-title" fill="#065F46" font-size="12">守护人 (Guardian)</text>
    
    <g transform="translate(20, 65)">
        <rect width="210" height="120" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-opacity="0.3"/>
        <text x="105" y="35" text-anchor="middle" class="node-title" fill="#065F46" font-size="13">实时风险同步</text>
        <text x="15" y="70" class="node-desc">• WebSocket 极速分发</text>
        <text x="15" y="93" class="node-desc">• 全局高分贝双向告警</text>
    </g>

    <g transform="translate(20, 260)">
        <rect width="210" height="110" rx="12" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
        <text x="105" y="32" text-anchor="middle" class="node-title" fill="#92400E" font-size="13">远程策略干预</text>
        <text x="10" y="65" class="node-desc">• 多端同步风险管控指令</text>
        <text x="10" y="88" class="node-desc">• 人机复合判研确认</text>
    </g>
  </g>

  <!-- ROBUST DIRECTIONAL ARROWS -->
  <path d="M 350 325 L 400 325" class="sync-line" stroke="#F43F5E" marker-end="url(#arrow-rose)"/>
  <text x="375" y="315" text-anchor="middle" class="node-desc" fill="#F43F5E" font-weight="900" font-size="11">风险上传</text>

  <path d="M 600 325 L 650 325" class="sync-line" stroke="#10B981" marker-end="url(#arrow-emerald)"/>
  <text x="625" y="315" text-anchor="middle" class="node-desc" fill="#10B981" font-weight="900" font-size="11">干预下发</text>

</svg>
