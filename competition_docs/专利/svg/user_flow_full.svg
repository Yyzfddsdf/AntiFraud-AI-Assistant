<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>

    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    
    <linearGradient id="nodeGradAlt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="nodeGradWarn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 700; fill: #1E293B; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 500; fill: #64748B; }
    .node-text { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #FFFFFF; }
    .line-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; }
    .line { stroke: #94A3B8; stroke-width: 3; fill: none; }
    .line-dashed { stroke: #94A3B8; stroke-width: 3; fill: none; stroke-dasharray: 6; }
  </style>

  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <text x="600" y="50" text-anchor="middle" class="title">反诈卫士 (Sensible AI) - 普通用户完整分析流程 (慢路径)</text>
  <text x="600" y="80" text-anchor="middle" class="subtitle">展示多模态深度分析、智能体执行与归档案件的流转过程</text>

  <!-- Row 1: Input -->
  <rect x="50" y="150" width="220" height="60" rx="30" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="160" y="186" text-anchor="middle" class="node-text">用户提交可疑内容</text>
  <text x="160" y="235" text-anchor="middle" class="line-text">(图、文、音、视)</text>

  <path d="M 270 180 L 360 180" class="line" marker-end="url(#arrow)"/>
  
  <rect x="370" y="150" width="220" height="60" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="186" text-anchor="middle" class="line-text" fill="#1E293B">输入校验与任务入库</text>

  <path d="M 590 180 L 890 180" class="line" marker-end="url(#arrow)"/>
  <text x="740" y="170" text-anchor="middle" class="line-text">State: pending</text>

  <!-- Task Queue / Start processing -->
  <rect x="900" y="150" width="220" height="60" rx="8" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="1010" y="186" text-anchor="middle" class="node-text">异步队列提取处理</text>

  <path d="M 1010 210 L 1010 300" class="line" marker-end="url(#arrow)"/>

  <!-- Row 2: Agents -->
  <rect x="900" y="310" width="220" height="60" rx="8" fill="url(#nodeGradAlt)" filter="url(#shadow)"/>
  <text x="1010" y="346" text-anchor="middle" class="node-text">子智能体并发线索提取</text>

  <path d="M 900 340 L 730 340" class="line" marker-end="url(#arrow)"/>
  <text x="815" y="330" text-anchor="middle" class="line-text">输出结构化 Insights</text>

  <!-- Main Agent Step -->
  <rect x="420" y="280" width="300" height="120" rx="16" fill="#FFFFFF" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="320" text-anchor="middle" class="title" fill="#10B981" font-size="20">主智能体 (Main Agent)</text>
  <text x="570" y="350" text-anchor="middle" class="line-text">1. 聚合文本与多模态洞察</text>
  <text x="570" y="375" text-anchor="middle" class="line-text">2. 工具调用闭环 (RAG/评分)</text>

  <!-- Tools call loop -->
  <path d="M 570 400 L 570 470" class="line" marker-end="url(#arrow)"/>
  <path d="M 570 530 L 570 590" class="line" marker-end="url(#arrow)"/>

  <!-- Tool interactions -->
  <rect x="50" y="310" width="220" height="60" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  <text x="160" y="346" text-anchor="middle" class="line-text">历史与全局增强 (RAG)</text>
  <path d="M 420 340 L 280 340" class="line-dashed" marker-end="url(#arrow)"/>
  <path d="M 280 355 L 420 355" class="line-dashed" marker-end="url(#arrow)"/>

  <rect x="420" y="470" width="300" height="60" rx="8" fill="url(#nodeGradWarn)" filter="url(#shadow)"/>
  <text x="570" y="506" text-anchor="middle" class="node-text">生成最终报告与动态阈值判定</text>

  <rect x="420" y="600" width="300" height="60" rx="8" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="570" y="636" text-anchor="middle" class="node-text">写入历史归档 / 更新索引</text>

  <path d="M 420 630 L 280 630" class="line" marker-end="url(#arrow)"/>
  <text x="350" y="620" text-anchor="middle" class="line-text">State: completed</text>

  <rect x="60" y="600" width="210" height="60" rx="30" fill="url(#nodeGradAlt)" filter="url(#shadow)"/>
  <text x="165" y="636" text-anchor="middle" class="node-text">通知用户</text>

  <path d="M 720 630 L 880 630" class="line-dashed" marker-end="url(#arrow)"/>
  <text x="800" y="620" text-anchor="middle" class="line-text">高危触发事件</text>

  <!-- Family Broadcast -->
  <rect x="890" y="600" width="220" height="60" rx="8" fill="#EF4444" filter="url(#shadow)"/>
  <text x="1000" y="636" text-anchor="middle" class="node-text">家庭通知机制 (WS下发)</text>

</svg>
