<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>

    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 700; fill: #1E293B; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 500; fill: #64748B; }
    .node-title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 600; fill: #FFFFFF; }
    .card-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #1E293B; }
    .card-subtext { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 400; fill: #64748B; }
    .line { stroke: #94A3B8; stroke-width: 2; fill: none; }
    .line-hit { stroke: #10B981; stroke-width: 2; fill: none; }
    .line-miss { stroke: #F59E0B; stroke-width: 2; fill: none; stroke-dasharray: 6; }
  </style>

  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <text x="600" y="50" text-anchor="middle" class="title">反诈卫士 (Sentinel AI) - 数据库与缓存协同架构图</text>
  <text x="600" y="80" text-anchor="middle" class="subtitle">展示 Redis 集群在限流、会话保护与底层 SQLite 检索降解中的关键作用</text>

  <!-- Request Side -->
  <rect x="50" y="340" width="160" height="60" rx="30" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="376" text-anchor="middle" class="card-text">业务 / 检索请求</text>
  
  <!-- Flow to Cache Layer -->
  <path d="M 210 370 L 300 370" class="line" marker-end="url(#arrow)"/>
  <rect x="230" y="350" width="40" height="20" fill="#FFFFFF" rx="4"/>
  <text x="250" y="364" text-anchor="middle" class="card-subtext">GET</text>

  <!-- Cache Layer -->
  <rect x="300" y="200" width="300" height="400" rx="16" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="300" y="200" width="300" height="50" rx="16" fill="url(#redisGrad)"/>
  <rect x="300" y="230" width="300" height="20" fill="url(#redisGrad)"/>
  <text x="450" y="232" text-anchor="middle" class="node-title">Redis 高速缓存屏蔽层</text>

  <rect x="330" y="280" width="240" height="50" fill="#FEF2F2" rx="6"/>
  <text x="450" y="300" text-anchor="middle" class="card-text">限流计数与反爬</text>
  <text x="450" y="320" text-anchor="middle" class="card-subtext">rate_limit:ip:window (TTL:10s)</text>

  <rect x="330" y="360" width="240" height="50" fill="#FEF2F2" rx="6"/>
  <text x="450" y="380" text-anchor="middle" class="card-text">会话与多体状态管理</text>
  <text x="450" y="400" text-anchor="middle" class="card-subtext">chat:context:&lt;user&gt; (TTL:5m)</text>

  <rect x="330" y="440" width="240" height="50" fill="#FEF2F2" rx="6"/>
  <text x="450" y="460" text-anchor="middle" class="card-text">地区聚合热点态势</text>
  <text x="450" y="480" text-anchor="middle" class="card-subtext">stats:region_v1 (TTL:2m)</text>

  <rect x="330" y="520" width="240" height="50" fill="#FEF2F2" rx="6"/>
  <text x="450" y="540" text-anchor="middle" class="card-text">知识库前置向量索引空间</text>
  <text x="450" y="560" text-anchor="middle" class="card-subtext">vector_records (Pre-warmed)</text>

  <!-- Hit return -->
  <path d="M 300 480 L 130 480 L 130 410" class="line-hit" marker-end="url(#arrow-green)"/>
  <rect x="150" y="470" width="60" height="20" fill="#ECFCCB" rx="4"/>
  <text x="180" y="484" text-anchor="middle" class="card-subtext" fill="#10B981">Cache Hit</text>

  <!-- Cache Miss / DB Access -->
  <path d="M 600 370 L 900 370" class="line" marker-end="url(#arrow)"/>
  <rect x="700" y="340" width="90" height="20" fill="#FFFFFF" rx="4" stroke="#E2E8F0"/>
  <text x="745" y="354" text-anchor="middle" class="card-subtext" fill="#F59E0B">Cache Miss</text>

  <!-- Database Layer -->
  <rect x="900" y="240" width="250" height="300" rx="16" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="900" y="240" width="250" height="50" rx="16" fill="url(#dbGrad)"/>
  <rect x="900" y="270" width="250" height="20" fill="url(#dbGrad)"/>
  <text x="1025" y="272" text-anchor="middle" class="node-title">底层 SQLite 持久化层</text>

  <rect x="930" y="320" width="190" height="80" fill="#EFF6FF" rx="6" stroke="#93C5FD"/>
  <text x="1025" y="355" text-anchor="middle" class="card-text">auth_system.db</text>
  <text x="1025" y="375" text-anchor="middle" class="card-subtext">主业务/重查询耗时区</text>
  
  <rect x="930" y="420" width="190" height="80" fill="#EFF6FF" rx="6" stroke="#93C5FD"/>
  <text x="1025" y="455" text-anchor="middle" class="card-text" font-size="12">historical_case_library.db</text>
  <text x="1025" y="475" text-anchor="middle" class="card-subtext">案例大宽表与向量本体</text>

  <!-- Data sync / Write back -->
  <path d="M 900 450 L 600 450" class="line-miss" marker-end="url(#arrow)"/>
  <rect x="700" y="460" width="80" height="20" fill="#FFFFFF" rx="4" stroke="#E2E8F0"/>
  <text x="740" y="474" text-anchor="middle" class="card-subtext" fill="#64748B">Write Back</text>
  
  <path d="M 600 660 L 900 660 L 900 610" class="line" marker-end="url(#arrow)"/>
  <path d="M 600 660 L 600 610" class="line" marker-end="url(#arrow)"/>
  <text x="750" y="650" text-anchor="middle" class="card-subtext">主从写入同步更新缓存 (如缓存重置)</text>

</svg>

