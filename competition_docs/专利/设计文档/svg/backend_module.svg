<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>

    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    
    <linearGradient id="bootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 700; fill: #1E293B; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 500; fill: #64748B; }
    .layer-title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 600; fill: #FFFFFF; }
    .mod-title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #334155; }
    .mod-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 400; fill: #64748B; }
    .line { stroke: #CBD5E1; stroke-width: 2; fill: none; }
    .line-thick { stroke: #94A3B8; stroke-width: 3; fill: none; }
  </style>

  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <text x="600" y="50" text-anchor="middle" class="title">反诈卫士 (Sentinel AI) - 后端模块与六边形架构图</text>
  <text x="600" y="80" text-anchor="middle" class="subtitle">展示 cmd/api、bootstrap、platform 及内部业务模块的高内聚低耦合结构</text>

  <!-- Level 1: Entry -->
  <rect x="500" y="130" width="200" height="60" rx="30" fill="url(#apiGrad)" filter="url(#shadow)"/>
  <text x="600" y="161" text-anchor="middle" class="layer-title">cmd/api/main.go</text>
  <text x="600" y="180" text-anchor="middle" fill="#DBEAFE" font-size="12" font-family="sans-serif">System Entry Point</text>

  <path d="M 600 190 L 600 240" class="line-thick" marker-end="url(#arrow)"/>

  <!-- Level 2: Bootstrap -->
  <rect x="400" y="240" width="400" height="80" rx="16" fill="url(#bootGrad)" filter="url(#shadow)"/>
  <text x="600" y="275" text-anchor="middle" class="layer-title">internal/bootstrap</text>
  <text x="600" y="300" text-anchor="middle" fill="#EDE9FE" font-size="14" font-family="sans-serif">组合根构建 / 配置加载 / 路由注册与拦截器组装</text>

  <path d="M 500 320 L 300 370" class="line-thick" marker-end="url(#arrow)"/>
  <path d="M 700 320 L 900 370" class="line-thick" marker-end="url(#arrow)"/>
  <path d="M 600 320 L 600 500" class="line-thick" marker-end="url(#arrow)"/>

  <!-- Level 3 Left: Platform -->
  <rect x="50" y="370" width="300" height="300" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="370" width="300" height="50" rx="20" fill="#10B981"/>
  <rect x="50" y="400" width="300" height="20" fill="#10B981"/>
  <text x="200" y="402" text-anchor="middle" class="layer-title">internal/platform</text>

  <rect x="80" y="440" width="240" height="40" rx="6" fill="#F1F5F9"/>
  <text x="200" y="465" text-anchor="middle" class="mod-title">Database &amp; Redis Cache</text>

  <rect x="80" y="495" width="240" height="40" rx="6" fill="#F1F5F9"/>
  <text x="200" y="520" text-anchor="middle" class="mod-title">LLM Agent Clients (OpenAI)</text>

  <rect x="80" y="550" width="240" height="40" rx="6" fill="#F1F5F9"/>
  <text x="200" y="575" text-anchor="middle" class="mod-title">Embedding &amp; Vector Search</text>

  <rect x="80" y="605" width="240" height="40" rx="6" fill="#F1F5F9"/>
  <text x="200" y="630" text-anchor="middle" class="mod-title">Tavily Web Search Adapter</text>


  <!-- Level 3 Right: API Gateway/Routers -->
  <rect x="850" y="370" width="300" height="300" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="850" y="370" width="300" height="50" rx="20" fill="#F59E0B"/>
  <rect x="850" y="400" width="300" height="20" fill="#F59E0B"/>
  <text x="1000" y="402" text-anchor="middle" class="layer-title">HTTP/WS Adapters</text>

  <rect x="880" y="440" width="240" height="40" rx="6" fill="#FEF3C7"/>
  <text x="1000" y="465" text-anchor="middle" class="mod-title">Gin Routers (/api/v1)</text>

  <rect x="880" y="495" width="240" height="40" rx="6" fill="#FEF3C7"/>
  <text x="1000" y="520" text-anchor="middle" class="mod-title">JWT Auth Middlewares</text>

  <rect x="880" y="550" width="240" height="40" rx="6" fill="#FEF3C7"/>
  <text x="1000" y="575" text-anchor="middle" class="mod-title">WebSocket Hubs (Alerts)</text>

  <rect x="880" y="605" width="240" height="40" rx="6" fill="#FEF3C7"/>
  <text x="1000" y="630" text-anchor="middle" class="mod-title">Request Payloads &amp; Validation</text>


  <!-- Center core: internal/modules -->
  <rect x="400" y="500" width="400" height="250" rx="20" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3" filter="url(#shadow)"/>
  <rect x="400" y="500" width="400" height="50" rx="20" fill="#3B82F6"/>
  <rect x="400" y="530" width="400" height="20" fill="#3B82F6"/>
  <text x="600" y="532" text-anchor="middle" class="layer-title">核心业务域 (internal/modules)</text>

  <circle cx="500" cy="590" r="40" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="500" y="585" text-anchor="middle" class="mod-title">Auth</text>
  <text x="500" y="605" text-anchor="middle" class="mod-text">登录认证</text>

  <circle cx="700" cy="590" r="40" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="700" y="585" text-anchor="middle" class="mod-title">Agents</text>
  <text x="700" y="605" text-anchor="middle" class="mod-text">多体调度</text>

  <circle cx="500" cy="690" r="40" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="500" y="685" text-anchor="middle" class="mod-title">Family</text>
  <text x="500" y="705" text-anchor="middle" class="mod-text">联防群组</text>

  <circle cx="700" cy="690" r="40" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="700" y="685" text-anchor="middle" class="mod-title">RAG</text>
  <text x="700" y="705" text-anchor="middle" class="mod-text">向量召回</text>

  <circle cx="600" cy="640" r="40" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="600" y="635" text-anchor="middle" class="mod-title">Stats</text>
  <text x="600" y="655" text-anchor="middle" class="mod-text">大盘分析</text>

  <!-- Connectors Hexagonal -->
  <path d="M 350 520 L 400 520" class="line-thick" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <path d="M 850 520 L 800 520" class="line-thick" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

</svg>

