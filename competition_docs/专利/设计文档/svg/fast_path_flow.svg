<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>

    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    
    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 700; fill: #1E293B; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 500; fill: #64748B; }
    .node-text { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #FFFFFF; }
    .line-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; }
    .decision-text { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #3B82F6; }
    .line { stroke: #94A3B8; stroke-width: 3; fill: none; }
  </style>

  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <text x="600" y="50" text-anchor="middle" class="title">反诈卫士 (Sensible AI) - Android 快路径判决流程 (Fast Path)</text>
  <text x="600" y="80" text-anchor="middle" class="subtitle">展示无障碍抓取、OCR兜底及加权分级告警的高频防线机制</text>

  <!-- Start event -->
  <rect x="500" y="130" width="200" height="50" rx="25" fill="#10B981" filter="url(#shadow)"/>
  <text x="600" y="161" text-anchor="middle" class="node-text">悬浮球触发 / 页面切换</text>

  <path d="M 600 180 L 600 230" class="line" marker-end="url(#arrow)"/>
  
  <!-- Condition: Accessibility enabled? -->
  <polygon points="600,230 700,270 600,310 500,270" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="275" text-anchor="middle" class="decision-text">无障碍权限开启?</text>
  
  <!-- Path YES -->
  <path d="M 500 270 L 350 270 L 350 330" class="line" marker-end="url(#arrow)"/>
  <text x="425" y="260" text-anchor="middle" class="line-text" fill="#10B981">是 (Yes)</text>

  <rect x="250" y="330" width="200" height="60" rx="8" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="350" y="366" text-anchor="middle" class="node-text">读取底层控件内容</text>

  <!-- Path NO -->
  <path d="M 700 270 L 850 270 L 850 330" class="line" marker-end="url(#arrow)"/>
  <text x="775" y="260" text-anchor="middle" class="line-text" fill="#EF4444">否 (受限 / 截图兜底)</text>

  <rect x="750" y="330" width="200" height="60" rx="8" fill="url(#nodeGradAlt)" filter="url(#shadow)"/>
  <text x="850" y="366" text-anchor="middle" class="node-text">静默截图与本地 OCR</text>

  <!-- Convergence Base Text -->
  <path d="M 350 390 L 350 440 L 580 440" class="line" marker-end="url(#arrow)"/>
  <path d="M 850 390 L 850 440 L 620 440" class="line" marker-end="url(#arrow)"/>

  <rect x="450" y="470" width="300" height="80" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="505" text-anchor="middle" class="decision-text">文本清洗与特征加权判定</text>
  <text x="600" y="530" text-anchor="middle" class="line-text">命中权威冒充 + 资金类 + 紧迫词 = 追加分</text>
  
  <path d="M 600 440 L 600 470" class="line" marker-end="url(#arrow)"/>
  
  <!-- Output Decisions -->
  <path d="M 600 550 L 600 600 L 250 600 L 250 640" class="line" marker-end="url(#arrow)"/>
  <path d="M 600 550 L 600 640" class="line" marker-end="url(#arrow)"/>
  <path d="M 600 550 L 600 600 L 950 600 L 950 640" class="line" marker-end="url(#arrow)"/>

  <!-- Low Score -->
  <rect x="150" y="640" width="200" height="60" rx="8" fill="#94A3B8" filter="url(#shadow)"/>
  <text x="250" y="670" text-anchor="middle" class="node-text">低分段：普通无感</text>
  <text x="250" y="690" text-anchor="middle" class="line-text" fill="#FFFFFF">悬浮球保持常带状态</text>

  <!-- Mid Score -->
  <rect x="500" y="640" width="200" height="60" rx="8" fill="url(#warnGrad)" filter="url(#shadow)"/>
  <text x="600" y="670" text-anchor="middle" class="node-text">中高分：强力提示</text>
  <text x="600" y="690" text-anchor="middle" class="line-text" fill="#FFFFFF">通知栏或轻弹窗警告</text>

  <!-- High Score -->
  <rect x="850" y="640" width="200" height="60" rx="8" fill="url(#alertGrad)" filter="url(#shadow)"/>
  <text x="950" y="670" text-anchor="middle" class="node-text">高危：阻断式拦截</text>
  <text x="950" y="690" text-anchor="middle" class="line-text" fill="#FFFFFF">推荐转入后台深度复审</text>

</svg>
