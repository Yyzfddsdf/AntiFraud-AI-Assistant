<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grad1)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Abstract Circuit Lines -->
  <path d="M0,200 Q200,100 400,200 T800,200" fill="none" stroke="rgba(56, 189, 248, 0.1)" stroke-width="2" />
  <path d="M0,220 Q200,120 400,220 T800,220" fill="none" stroke="rgba(56, 189, 248, 0.05)" stroke-width="1" />
  <path d="M0,180 Q200,80 400,180 T800,180" fill="none" stroke="rgba(56, 189, 248, 0.05)" stroke-width="1" />
  
  <!-- Decorative Circles -->
  <circle cx="700" cy="100" r="150" fill="url(#grad1)" stroke="rgba(255,255,255,0.03)" stroke-width="40" />
  <circle cx="100" cy="300" r="100" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="20" />
  
  <!-- Shield Watermark (Subtle) -->
  <path d="M650 150 C650 150 650 250 700 300 C750 250 750 150 750 150 L700 130 L650 150 Z" fill="rgba(255,255,255,0.03)" transform="translate(-50, 20) scale(1.5)" />
</svg>