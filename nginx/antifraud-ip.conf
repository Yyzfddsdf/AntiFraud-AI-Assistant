map $http_user_agent $antifraud_mobile_client {
    default 0;
    "~*(android|iphone|ipod|ipad|mobile|windows phone)" 1;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;

    client_max_body_size 20m;

    root /root/AntiFraud-AI-Assistant/nginx/build/desktop;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = / {
        if ($antifraud_mobile_client) {
            return 302 /m/;
        }

        try_files /index.html =404;
    }

    location = /m {
        return 301 /m/;
    }

    location ^~ /m/ {
        alias /root/AntiFraud-AI-Assistant/nginx/build/mobile/;
        try_files $uri $uri/ /m/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}